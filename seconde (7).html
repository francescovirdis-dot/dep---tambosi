<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEP Seconde — ITE Tambosi</title>
<style>
:root{
  --navy:#1A2340;--teal:#2DC5A2;--gold:#C9A84C;--slate:#3D5166;
  --light:#E8F4F1;--bg:#F5F7FA;--white:#FFFFFF;--gray:#8A96A3;
  --text:#222222;--err:#C0392B;--ok:#1A7A4A;
  --dir:#1565C0;--dirL:#E3F2FD;--dirB:#1E88E5;
  --eco:#6A1B9A;--ecoL:#F3E5F5;--ecoB:#8E24AA;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

#header{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
#header h1{color:var(--white);font-size:.88rem;font-weight:700;}
#header-info{color:var(--teal);font-size:.79rem;}

#stepper{background:var(--white);border-bottom:2px solid var(--light);padding:10px 16px;display:flex;align-items:center;overflow-x:auto;position:sticky;top:45px;z-index:99;}
.step-item{display:flex;align-items:center;}
.step-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:3px 5px;cursor:not-allowed;}
.step-btn.ok,.step-btn.curr{cursor:pointer;}
.step-btn.curr{cursor:default;}
.step-circle{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.77rem;border:2px solid #CDD1D9;color:var(--gray);background:var(--white);}
.step-btn.ok .step-circle{background:var(--teal);border-color:var(--teal);color:var(--white);}
.step-btn.curr .step-circle{background:var(--navy);border-color:var(--navy);color:var(--white);}
.step-label{font-size:.55rem;color:var(--gray);white-space:nowrap;text-align:center;max-width:64px;}
.step-btn.curr .step-label{color:var(--navy);font-weight:700;}
.step-btn.ok .step-label{color:var(--teal);}
.step-conn{width:14px;height:2px;background:#DDE1E7;flex-shrink:0;}
.step-conn.done{background:var(--teal);}

#pbar-wrap{height:4px;background:#E0E4EA;overflow:hidden;}
#pbar{height:100%;background:var(--teal);transition:width .6s;}
#main{max-width:820px;margin:0 auto;padding:18px 14px 100px;}

/* CARD */
.card{background:var(--white);border-radius:11px;box-shadow:0 2px 11px rgba(26,35,64,.07);padding:22px;margin-bottom:16px;}
.card-title{font-size:.97rem;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:9px;}
.c-icon{width:30px;height:30px;background:var(--light);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}

/* SEZIONE WRAPPER */
.sezione-blk{border-radius:14px;padding:3px;margin-bottom:20px;}
.sezione-blk.dir{background:linear-gradient(135deg,var(--dirB),var(--dir));}
.sezione-blk.eco{background:linear-gradient(135deg,var(--ecoB),var(--eco));}
.sezione-inner{background:var(--bg);border-radius:12px;padding:16px;}

.sezione-hdr{border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sezione-hdr.dir{background:var(--dirL);border:2px solid var(--dirB);}
.sezione-hdr.eco{background:var(--ecoL);border:2px solid var(--ecoB);}
.sezione-hdr h2{font-size:1.05rem;font-weight:800;}
.sezione-hdr.dir h2{color:var(--dir);}
.sezione-hdr.eco h2{color:var(--eco);}
.timer-pill{padding:5px 13px;border-radius:18px;font-size:.8rem;font-weight:700;}
.timer-pill.dir{background:var(--dir);color:var(--white);}
.timer-pill.eco{background:var(--eco);color:var(--white);}

/* CALLOUT */
.callout{border-radius:8px;padding:11px 14px;font-size:.86rem;line-height:1.6;}
.ci{background:var(--light);border-left:4px solid var(--teal);color:var(--slate);}
.cw{background:#FFF8E1;border-left:4px solid var(--gold);color:#7A5C00;}
.co{background:#D4EDDA;border-left:4px solid var(--ok);color:#145224;}
.cn{background:var(--navy);border-left:4px solid var(--teal);color:var(--white);}
.ce{background:#F8D7DA;border-left:4px solid var(--err);color:#7a1020;}
.cdir{background:var(--dirL);border-left:4px solid var(--dir);color:var(--dir);}
.ceco{background:var(--ecoL);border-left:4px solid var(--eco);color:var(--eco);}

/* TESTO */
.tp{font-size:.92rem;line-height:1.77;color:#333;margin-bottom:11px;}
.tp:last-child{margin-bottom:0;}
.th{font-size:.94rem;font-weight:700;margin:14px 0 5px;}
.th.dir{color:var(--dir);}
.th.eco{color:var(--eco);}
.ev{border-radius:4px;padding:1px 6px;font-weight:600;}
.ev.dir{background:var(--dirL);color:var(--dir);}
.ev.eco{background:var(--ecoL);color:var(--eco);}
.qt{border-left:3px solid var(--gold);padding:9px 14px;margin:10px 0;font-style:italic;color:var(--slate);font-size:.88rem;}

/* BOTTONI */
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.bp{background:var(--teal);color:var(--white);}
.bn{background:var(--navy);color:var(--white);}
.bo{background:transparent;border:2px solid var(--teal);color:var(--teal);}
.bg{background:var(--gold);color:var(--navy);font-weight:800;}
.bdir{background:var(--dir);color:var(--white);}
.beco{background:var(--eco);color:var(--white);}
.btn:disabled{opacity:.38;cursor:not-allowed;}

/* BRAINSTORMING */
.bs-row{display:flex;gap:7px;margin-bottom:7px;}
.bs-row input{flex:1;padding:8px 12px;border:2px solid #DDE1E7;border-radius:8px;font-size:.93rem;font-family:inherit;}
.bs-row input:focus{outline:none;border-color:var(--teal);}
#bs-fb-dir,#bs-fb-eco{font-size:.82rem;min-height:17px;margin-bottom:7px;font-weight:600;}
.sog-wrap{height:4px;background:#E0E4EA;border-radius:3px;overflow:hidden;margin-bottom:4px;}
.sog-bar{height:100%;background:var(--teal);border-radius:3px;transition:width .4s;}
.bs-cnt{font-size:.76rem;color:var(--gray);margin-bottom:9px;}
.bs-tags{min-height:36px;display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--bg);border-radius:8px;border:1px dashed #CDD1D9;margin-bottom:8px;}
.bs-tag{display:inline-block;padding:3px 10px;border-radius:14px;background:var(--teal);color:var(--white);font-size:.8rem;font-weight:700;}

/* WORD CLOUD */
.wc-wrap{display:none;margin-top:10px;}
.wc-canvas{width:100%;min-height:160px;background:var(--navy);border-radius:10px;padding:18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;}
.wc-word{display:inline-block;border-radius:6px;padding:4px 10px;font-weight:700;cursor:default;}
.wc-chiave{background:var(--gold);color:var(--navy);}
.wc-comune{background:var(--teal);color:var(--white);}
.wc-raro{background:#3D5166;color:#CDD1D9;}
.wc-legenda{font-size:.76rem;color:var(--gray);margin-top:7px;text-align:center;}
.wc-confronto{font-size:.86rem;color:var(--slate);margin-top:9px;padding:9px 13px;background:var(--bg);border-radius:8px;border:1px dashed #CDD1D9;}

/* MAPPE SVG */
.mappa-svg-wrap{background:var(--bg);border-radius:10px;padding:14px;margin:10px 0;overflow-x:auto;}
.mappa-svg-wrap svg{display:block;margin:0 auto;}

/* NODI LACUNOSI */
.nl{background:var(--bg);border-radius:9px;padding:14px;margin-bottom:11px;border:2px solid #E0E4EA;}
.nl.nok{border-color:var(--ok);background:#D4EDDA14;}
.nl.nko{border-color:var(--err);background:#F8D7DA14;}
.fl{font-size:.93rem;line-height:1.8;color:var(--navy);font-weight:500;margin-bottom:9px;}
.bw{color:var(--teal);font-weight:700;border-bottom:2px solid var(--teal);padding:0 3px;}
.opz{display:flex;flex-wrap:wrap;gap:6px;}
.ob{padding:5px 12px;border:2px solid #DDE1E7;border-radius:15px;background:var(--white);font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--text);}
.ob:hover{border-color:var(--teal);color:var(--teal);}
.ob.sel{border-color:var(--navy);background:var(--navy);color:var(--white);}
.ob.corr{border-color:var(--ok);background:var(--ok);color:var(--white);}
.ob.sba{border-color:var(--err);background:var(--err);color:var(--white);}
.nfb{margin-top:6px;font-size:.8rem;font-weight:600;min-height:13px;}

/* CLOZE */
.cloze-q{background:var(--bg);border-radius:9px;padding:14px;margin-bottom:11px;border:2px solid #E0E4EA;}
.cloze-q.nok{border-color:var(--ok);}
.cloze-q.nko{border-color:var(--err);}
.cloze-testo{font-size:.91rem;line-height:1.7;margin-bottom:9px;color:var(--navy);}

/* FLASHCARD */
.fc-wrap{margin-bottom:11px;}
.fc{width:100%;cursor:pointer;}
.fcf,.fcb{width:100%;min-height:138px;border-radius:9px;padding:18px;display:flex;align-items:center;justify-content:center;text-align:center;box-sizing:border-box;}
.fcf{background:var(--navy);color:var(--white);font-size:.95rem;font-weight:600;border:3px solid var(--teal);}
.fcf.dir{border-color:var(--dir);}
.fcf.eco{border-color:var(--eco);}
.fcb{background:var(--light);color:var(--navy);font-size:.87rem;line-height:1.6;border:3px solid var(--teal);display:none;}
.fcb.dir{background:var(--dirL);border-color:var(--dir);}
.fcb.eco{background:var(--ecoL);border-color:var(--eco);}
.fc.flip .fcf{display:none;}
.fc.flip .fcb{display:flex;}
.fcb-inner{width:100%;text-align:center;}
.fc-hint{display:block;text-align:right;font-size:.66rem;opacity:.45;margin-top:5px;}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fc-stato{display:flex;gap:7px;margin-top:9px;}
.fc-stato button{flex:1;padding:7px;border-radius:7px;border:none;font-family:inherit;font-size:.81rem;font-weight:700;cursor:pointer;}
.fsok{background:var(--ok);color:var(--white);}
.fsrip{background:#E0E4EA;color:var(--slate);}
.fc-mat{display:inline-block;padding:2px 7px;border-radius:9px;font-size:.68rem;font-weight:700;margin-bottom:5px;}
.fc-mat-dir{background:var(--dirL);color:var(--dir);}
.fc-mat-eco{background:var(--ecoL);color:var(--eco);}

/* QUADERNO */
.quad-step{background:var(--bg);border-radius:9px;padding:13px;margin-bottom:9px;border:2px solid #E0E4EA;}
.quad-step.done{border-color:var(--ok);background:#D4EDDA14;}
.quad-step.dir-s{border-left:4px solid var(--dir);}
.quad-step.eco-s{border-left:4px solid var(--eco);}
.quad-step-hdr{display:flex;align-items:flex-start;gap:9px;}
.qchk{width:21px;height:21px;border-radius:5px;border:2px solid #CDD1D9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.76rem;flex-shrink:0;margin-top:1px;}
.qchk.on{background:var(--ok);border-color:var(--ok);color:var(--white);}
.quad-body{flex:1;}
.quad-title{font-weight:700;font-size:.87rem;color:var(--navy);margin-bottom:3px;}
.quad-desc{font-size:.82rem;color:var(--slate);line-height:1.53;}
.quad-desc strong{color:var(--navy);}
.quad-schema{background:var(--navy);border-radius:7px;padding:11px;margin-top:7px;font-family:'Courier New',monospace;font-size:.72rem;color:var(--teal);line-height:1.63;white-space:pre;}
.quad-unlock{margin-top:12px;padding:12px;background:var(--light);border-radius:8px;border:2px dashed var(--teal);text-align:center;}
.quad-mancano{font-size:.79rem;color:var(--err);font-weight:700;margin-top:4px;}

/* CASO */
.caso-hdr{background:linear-gradient(135deg,var(--navy),#2C3E6B);border-radius:9px;padding:16px;color:var(--white);margin-bottom:11px;}
.caso-tabs{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
.ctb{padding:5px 12px;border-radius:14px;border:2px solid #DDE1E7;background:var(--white);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--slate);}
.ctb.on{background:var(--navy);color:var(--white);border-color:var(--navy);}
.caso-sez{display:none;}
.caso-sez.vis{display:block;}

.tab-cf{width:100%;border-collapse:collapse;font-size:.83rem;margin:9px 0;}
.tab-cf th{background:var(--navy);color:var(--white);padding:8px 10px;text-align:left;}
.tab-cf td{padding:7px 10px;border-bottom:1px solid #EEE;vertical-align:top;}
.tab-cf tr:nth-child(even) td{background:var(--bg);}

/* MOTIV */
.motiv{text-align:center;padding:14px 10px;}
.motiv .em{font-size:2.1rem;margin-bottom:7px;}
.motiv p{font-size:.96rem;color:var(--navy);font-weight:500;line-height:1.6;max-width:490px;margin:0 auto;}
.perc{display:inline-block;background:var(--navy);color:var(--teal);font-size:1.75rem;font-weight:900;padding:9px 22px;border-radius:9px;margin-bottom:11px;letter-spacing:.04em;}

/* RIPASSO */
.rip-q{background:var(--bg);border-radius:9px;padding:14px;margin-bottom:11px;border:2px solid #E0E4EA;}
.rip-q.nok{border-color:var(--ok);}
.rip-q.nko{border-color:var(--err);}

/* LOGIN */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:18px;}
.lb{background:var(--white);border-radius:14px;padding:36px 32px;max-width:410px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.l-sig{font-size:1.9rem;font-weight:900;color:var(--navy);text-align:center;}
.l-sub{font-size:.78rem;color:var(--gray);text-align:center;margin-top:3px;margin-bottom:22px;}
.l-av{background:var(--light);border-left:4px solid var(--teal);padding:9px 12px;border-radius:0 8px 8px 0;font-size:.77rem;color:var(--slate);line-height:1.5;margin-bottom:18px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-weight:600;font-size:.78rem;color:var(--slate);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select{width:100%;padding:8px 12px;border:2px solid #DDE1E7;border-radius:8px;font-size:.95rem;font-family:inherit;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--teal);}
.ferr{color:var(--err);font-size:.78rem;margin-top:3px;min-height:13px;}

.hidden{display:none!important;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}
.tr{text-align:right;}.tc{text-align:center;}
.sep{height:1px;background:#EAEAEA;margin:14px 0;}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:.73rem;font-weight:700;}
.bdg-new{background:var(--teal);color:var(--white);}
.blocco-countdown{background:var(--navy);color:var(--beige);padding:12px 16px;border-radius:10px;text-align:center;font-size:14px;}
.step-btn.locked{opacity:0.45;cursor:not-allowed;}
</style>
</head>
<body>

<div id="screen-login">

    <div class="fg"><label>Il tuo nome</label><input type="text" id="inp-nome" placeholder="Nome e Cognome" maxlength="40" autocomplete="off"><div class="ferr" id="ferr-nome"></div></div>

</div>

<div id="screen-app" class="hidden">

  <div id="main"><div id="contenuto"></div></div>
</div>

const FC_DIR=[
  {id:'fd1',g:1,d:'Cosa sono gli enti locali?',r:'Enti pubblici territoriali che esercitano funzioni amministrative locali. I principali sono Comuni, Province, Città Metropolitane e Regioni.'},
  {id:'fd2',g:1,d:'Cos\'è il principio di sussidiarietà?',r:'Le funzioni pubbliche vanno svolte dall\'ente più vicino al cittadino capace di svolgerle. Solo se non è adeguato, interviene l\'ente superiore.'},
  {id:'fd3',g:2,d:'Quali sono gli organi del Comune?',r:'Consiglio Comunale (legislativo, eletto dai cittadini), Giunta Comunale (esecutivo), Sindaco (eletto direttamente dai cittadini).'},
  {id:'fd4',g:2,d:'Tre funzioni principali del Comune?',r:'Anagrafe e stato civile, edilizia e urbanistica, servizi sociali. Ma anche: scuole dell\'infanzia e primarie, trasporto locale, polizia municipale.'},
  {id:'fd5',g:3,d:'Cosa fa la Provincia dopo la riforma 2014?',r:'È ente di secondo livello (presidente non eletto direttamente). Si occupa di strade provinciali, edilizia scolastica superiore, ambiente e difesa del suolo.'},
  {id:'fd6',g:3,d:'Cos\'è la Città Metropolitana?',r:'Ha sostituito la Provincia nelle 14 principali città italiane. Il Sindaco metropolitano è il sindaco del capoluogo. Coordina i servizi dell\'area urbana allargata.'},
  {id:'fd7',g:4,d:'Differenza tra Regione ordinaria e speciale?',r:'Le 15 ordinarie hanno autonomia limitata. Le 5 speciali (Sicilia, Sardegna, VdA, FVG, Trentino-AA) hanno autonomia legislativa e fiscale molto più ampia, garantita dalla Costituzione.'},
  {id:'fd8',g:4,d:'Competenze principali della Regione?',r:'Sanità, indirizzi dell\'istruzione, trasporti regionali, pianificazione territoriale, turismo, agricoltura, formazione professionale.'},
  {id:'fd9',g:5,d:'Cos\'è la Provincia Autonoma di Trento?',r:'Ente unico nel panorama italiano con autonomia speciale costituzionale. Trattiene ~90% delle tasse locali. Può legiferare su sanità, istruzione, strade, università.'},
  {id:'fd10',g:5,d:'Perché il Trentino ha l\'autonomia speciale?',r:'Ragioni storiche (fu parte dell\'Austria fino al 1918) e tutela della minoranza linguistica tedesca. Lo Statuto del 1972 ne ha formalizzato l\'autonomia.'},
  {id:'fd11',g:6,d:'Cos\'è il federalismo fiscale?',r:'Il principio per cui gli enti locali si finanziano con proprie risorse invece di dipendere dai trasferimenti statali. Chi spende i soldi deve anche raccoglierli.'},
  {id:'fd12',g:6,d:'Differenza tra IMU e TARI?',r:'L\'IMU (Imposta Municipale Propria) si paga sugli immobili. La TARI (Tassa sui Rifiuti) finanzia il servizio di raccolta e smaltimento dei rifiuti. Entrambe vanno ai Comuni.'},
];
const FC_ECO=[
  {id:'fe1',g:1,d:'Cos\'è il PIL?',r:'Prodotto Interno Lordo: la somma del valore di tutti i beni e servizi prodotti in un Paese in un anno. È la misura principale della ricchezza di un Paese. Inventato da Simon Kuznets negli anni \'30 per misurare la Grande Depressione.'},
  {id:'fe2',g:1,d:'Cos\'è la crescita economica?',r:'L\'incremento del PIL nel tempo. È un fenomeno recente nella storia dell\'umanità: per secoli i livelli di produzione sono rimasti stabili. La Rivoluzione industriale (fine \'700) ha dato inizio alla crescita sostenuta.'},
  {id:'fe3',g:2,d:'Cos\'è la mano invisibile di Smith?',r:'In un mercato libero, ogni individuo che persegue il proprio interesse personale contribuisce — senza volerlo — al benessere collettivo. Il mercato si regola da solo senza bisogno di intervento dello Stato.'},
  {id:'fe4',g:2,d:'Cos\'è la divisione del lavoro secondo Smith?',r:'Specializzare ogni lavoratore in una sola operazione aumenta enormemente la produttività. Smith la dimostrò con la fabbrica di spilli: 10 operai specializzati producono 48.000 spilli al giorno invece di 10.'},
  {id:'fe5',g:3,d:'Cos\'è il vantaggio comparato di Ricardo?',r:'Anche se un Paese è meno efficiente in tutto, conviene specializzarsi in ciò che produce relativamente meglio e commerciare con gli altri. Il commercio internazionale crea vantaggio per tutti i partecipanti.'},
  {id:'fe6',g:3,d:'Cosa sosteneva Malthus sui limiti naturali?',r:'La popolazione cresce in progressione geometrica (2,4,8,16...) mentre la produzione di alimenti cresce in progressione aritmetica (2,4,6,8...). Esistono limiti naturali alla crescita economica che possono portare a conflitti e carestie.'},
  {id:'fe7',g:4,d:'Cos\'è il moltiplicatore keynesiano?',r:'Ogni euro di spesa pubblica genera più di un euro di PIL aggiuntivo perché si moltiplica nell\'economia. Se lo Stato spende 100€, i lavoratori li ricevono, li spendono, altri li ricevono e li rispendono... l\'effetto finale è maggiore dell\'investimento iniziale.'},
  {id:'fe8',g:4,d:'Quando si applica la teoria di Keynes?',r:'In periodi di crisi economica, quando la domanda privata è insufficiente. Lo Stato deve intervenire con spesa pubblica (opere pubbliche, sussidi) per rilanciare l\'economia. Roosevelt lo applicò con il New Deal negli USA dopo il 1929.'},
  {id:'fe9',g:5,d:'Cos\'è il monetarismo di Friedman?',r:'La politica monetaria (controllo della quantità di moneta) è più efficace della politica fiscale (spesa pubblica). L\'inflazione è sempre un fenomeno monetario: troppa moneta in circolazione fa salire i prezzi.'},
  {id:'fe10',g:5,d:'Cos\'è lo sviluppo sostenibile?',r:'Dal Rapporto Brundtland (1987): uno sviluppo che soddisfa i bisogni del presente senza compromettere la possibilità delle generazioni future di soddisfare i propri. Combina crescita economica, equità sociale e sostenibilità ambientale.'},
  {id:'fe11',g:6,d:'Cos\'è l\'economia circolare?',r:'Un modello economico che elimina i rifiuti e mantiene le risorse in uso il più a lungo possibile: estrazione → produzione → uso → raccolta → riciclo → di nuovo produzione. Si oppone all\'economia lineare (usa e getta).'},
  {id:'fe12',g:6,d:'Differenza tra economia lineare ed economia circolare?',r:'Economia lineare: estrai risorse → produci → consumi → butti (spreco). Economia circolare: progetta per durare → ripara → ricondiziona → ricicla → riduce emissioni. Obiettivo: una società a bassa emissione di CO₂.'},
];

const ipl=t=>t.replace(/\{nome\}/g,G.nome);
const VOLG=['cazzo','merda','vaffanculo','stronzo','coglione','figa','porco','puttana','bastardo'];
function contieneVolg(s){return VOLG.some(v=>s.toLowerCase().includes(v));}
function nomeOk(n){
  const s=n.trim();
  if(s.length<2)return 'Il nome è troppo corto.';
  if(/^(.)\1+$/.test(s))return 'Sembra una sequenza ripetuta.';
  if(!/[aeiouàèéìòù]/i.test(s))return 'Il nome non contiene vocali.';
  if(/^\d+$/.test(s))return 'Scrivi il tuo nome, non un numero.';
  return '';
}
function errKey(){return `${G.nome.toLowerCase().replace(/\s/g,'_')}_${G.classe}_${G.mod}_errori`;}
function loadErr(){try{G.errori=JSON.parse(localStorage.getItem(errKey())||'[]');}catch(e){G.errori=[];}}
function regErr(faseId,domId){
  loadErr();
  const i=G.errori.findIndex(e=>e.faseId===faseId&&e.domandaId===domId);
  if(i>=0)G.errori[i].tentativiErrati++;
  else G.errori.push({faseId,domandaId:domId,tentativiErrati:1});
  try{localStorage.setItem(errKey(),JSON.stringify(G.errori));}catch(e){}
}
function send(p){
  if(!CFG.gasUrl)return;
  try{
    let iframe=document.getElementById('_gas_ifr');
    if(!iframe){iframe=document.createElement('iframe');iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';document.body.appendChild(iframe);}
    const form=document.createElement('form');form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
    const inp=document.createElement('input');inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(p);
    form.appendChild(inp);document.body.appendChild(form);form.submit();
    setTimeout(()=>{try{document.body.removeChild(form);}catch(e){}},4000);
  }catch(e){}
}
function initSnap(i){
  if(!G.stati[i])G.stati[i]={completata:false,bs_dir:{parole:[],wc:false},bs_eco:{parole:[],wc:false},mappa:{},cloze:{},fc_dir:{idx:0,stati:{}},fc_eco:{idx:0,stati:{}},quad_dir:{},quad_eco:{},casoTabDir:0,casoTabEco:0};

function sv(path,val){

}

function inviaLogin(){
  // Ping al GAS al momento del login - registra l'accesso anche senza completamento
  if(!CFG.gasUrl) return;
  try {
    let iframe=document.getElementById('_gas_ifr');
    if(!iframe){iframe=document.createElement('iframe');iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';document.body.appendChild(iframe);}
    const form=document.createElement('form');form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
    const payload={
      nome:G.nome, classe:G.classe, mod:G.mod,
      giorno: 0, // 0 = solo login, non completato
      ts_start:G.ts_start, ts:new Date().toISOString(),
      tipo:'login',
      parole_dir:[], parole_eco:[], mappa:{}, fc_dir:{}, fc_eco:{}
    };
    const inp=document.createElement('input');inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(payload);
    form.appendChild(inp);document.body.appendChild(form);form.submit();
    setTimeout(()=>{form.remove();},3000);
  } catch(e){}
}

async function doLogin(){
  const ne=document.getElementById('inp-nome');const ce=document.getElementById('inp-classe');
  const en=document.getElementById('ferr-nome');const ec=document.getElementById('ferr-classe');
  en.textContent='';ec.textContent='';
  const err=nomeOk(ne.value);if(err){en.textContent=err;ne.focus();return;}
  if(!ce.value){ec.textContent='Seleziona la tua classe.';ce.focus();return;}
  G.nome=ne.value.trim();G.classe=ce.value;G.ts_start=new Date().toISOString();loadErr();

  // CHECK SERVER: orologio + blocchi notte/scuola server-side.
  // Tolleranza zero: se il server non risponde entro 8 secondi, l'app non parte.
  const btnLoginCheck = document.getElementById('btn-login');
  if(btnLoginCheck){btnLoginCheck.disabled=true;btnLoginCheck.textContent='Verifica in corso...';}
  try {
    const urlTime = CFG.gasUrl + '?action=getServerTime&key=' + encodeURIComponent(CFG.apiKey);
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 8000);
    const respTime = await fetch(urlTime, {signal: controller.signal});
    clearTimeout(timeoutId);
    const datiTime = await respTime.json();

    // 1. BLOCCO SERVER (notte o scuola): categorico
    if (datiTime && datiTime.blocco) {
      if(btnLoginCheck){btnLoginCheck.disabled=false;btnLoginCheck.textContent='Inizia il percorso →';}
      loggaBloccoServer(datiTime.blocco);
      mostraSchermataBloccoOrario(datiTime.blocco, datiTime.messaggio);
      return;
    }

    // 2. CHECK OROLOGIO CLIENT vs SERVER
    if (datiTime && datiTime.serverTimeMs) {
      const clientMs = new Date().getTime();
      const diffMs = Math.abs(clientMs - datiTime.serverTimeMs);
      const diffMin = Math.round(diffMs / 60000);
      if (diffMin > 5) {
        if(btnLoginCheck){btnLoginCheck.disabled=false;btnLoginCheck.textContent='Inizia il percorso →';}
        const errEl = document.getElementById('ferr-nome');
        if(errEl){
          errEl.innerHTML = `<div style="color:#C0392B;font-size:.85rem;line-height:1.5;margin-top:8px;padding:10px;background:#F8D7DA;border-radius:6px;border-left:3px solid #C0392B;">
            <strong>⚠ Orologio non corretto</strong><br>
            L'orologio del tuo dispositivo è sfasato di circa ${diffMin} minuti rispetto all'ora reale.<br>
            <strong>Correggi data e ora del dispositivo nelle impostazioni</strong>, poi ricarica la pagina.
          </div>`;
        }
        return;
      }
    }
  } catch(eTime) {
    if(btnLoginCheck){btnLoginCheck.disabled=false;btnLoginCheck.textContent='Inizia il percorso →';}
    const errEl = document.getElementById('ferr-nome');
    if(errEl){
      errEl.innerHTML = `<div style="color:#C0392B;font-size:.85rem;line-height:1.5;margin-top:8px;padding:10px;background:#F8D7DA;border-radius:6px;border-left:3px solid #C0392B;">
        <strong>⚠ Connessione al server non disponibile</strong><br>
        Non riesco a verificare che tutto sia in ordine. Controlla la tua connessione e riprova tra qualche secondo.
      </div>`;
    }
    return;
  }

  // FIX BYPASS TIMER 20 MIN: al login cancella i timer di sessioni precedenti.
  // Senza questo, uno studente che avviava il timer e chiudeva senza consegnare,
  // al rientro trovava il timer "scaduto" da ore e poteva bypassare il blocco dei 20 min.
  try {
    for(let f=0; f<7; f++){
      localStorage.removeItem(`${G.classe}_${G.mod}_g${f+1}_timer_dir`);
      localStorage.removeItem(`${G.classe}_${G.mod}_g${f+1}_timer_eco`);
    }
  } catch(e){}

  const btnLogin = document.getElementById('btn-login');
  if(btnLogin){btnLogin.disabled=true;btnLogin.textContent='Caricamento...';}

  // PING di login: registra l'accesso subito, anche senza completamento
  inviaLogin();

  try {
    const url = CFG.gasUrl + '?action=getProgressi&nome=' +
      encodeURIComponent(G.nome.toLowerCase()) +
      '&classe=' + encodeURIComponent(G.classe) +
      '&key=' + encodeURIComponent(CFG.apiKey);
    const resp = await fetch(url);
    const dati = await resp.json();

    if(dati && dati.ultimoGiorno && dati.ultimoGiorno > 0) {
      const ultimoG = dati.ultimoGiorno;
      // FIX BYPASS 18 ORE: il server restituisce il timestamp REALE dell'ultima consegna.
      // L'app lo sovrascrive nel localStorage, così cancellare dati del browser o
      // cambiare dispositivo non permette di resettare il conto delle 18 ore.
      const tsUltimoServerISO = dati.ultimoCompletamentoISO || null;
      for(let g=0; g<ultimoG; g++){
        if(!G.stati[g]) G.stati[g]={completata:false,bs_dir:{parole:[],wc:false},bs_eco:{parole:[],wc:false},mappa:{},cloze:{},fc_dir:{idx:0,stati:{}},fc_eco:{idx:0,stati:{}},quad_dir:{},quad_eco:{},casoTabDir:0,casoTabEco:0};
        G.stati[g].completata = true;
        const snapKey = `${G.classe}_${G.mod}_g${g}`;
        const snap = JSON.parse(localStorage.getItem(snapKey)||'{}');
        snap.completata = true;
        localStorage.setItem(snapKey, JSON.stringify(snap));
        // Per l'ULTIMO giorno completato: usa SEMPRE il timestamp del server.
        // Per i giorni precedenti: mantieni quello locale se c'è, altrimenti approssima ad adesso.
        const tsKey = keyCompletato(g);
        if (g === ultimoG - 1 && tsUltimoServerISO) {
          localStorage.setItem(tsKey, tsUltimoServerISO);
        } else if (!localStorage.getItem(tsKey)) {
          localStorage.setItem(tsKey, new Date().toISOString());
        }
      }
      // FIX AVVIO INTELLIGENTE: se il giorno successivo è sbloccato (18h passate),
      // manda direttamente a lavorare sul nuovo giorno. Se NON è sbloccato, mostra
      // una schermata BLOCCO con countdown grande e pulsante per rileggere.
      if (ultimoG < 7) {
        G.fase = ultimoG - 1; // temporaneo per isGiornoSbloccato
        if (isGiornoSbloccato(ultimoG)) {
          avviaApp(ultimoG); // vai al nuovo giorno
        } else {
          mostraSchermataBlocco(ultimoG); // countdown grande
        }
      } else {
        avviaApp(6); // modulo completato, mostra giorno 7
      }
    } else {
      avviaApp(0);
    }
  } catch(e) {
    avviaApp(0);
  } finally {
    if(btnLogin){btnLogin.disabled=false;btnLogin.textContent='Inizia il percorso →';}
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('inp-nome').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

// ═══════════════════════════
// TIMER SEZIONI (15 min)
// ═══════════════════════════
const MINUTI_MIN = 20;
const MS_MIN = MINUTI_MIN * 60 * 1000;

function keyTimer(mat) {
  return `${G.classe}_${G.mod}_g${G.fase+1}_timer_${mat}`;
}

function avviaTimer(mat) {
  const k = keyTimer(mat);
  if (!localStorage.getItem(k)) {
    localStorage.setItem(k, new Date().toISOString());
  }
}

function msTrascorsi(mat) {
  const k = keyTimer(mat);
  const ts = localStorage.getItem(k);
  if (!ts) return 0;
  return new Date() - new Date(ts);
}

function timerOk(mat) {
  return msTrascorsi(mat) >= MS_MIN;
}

function minMancanti(mat) {
  const ms = MS_MIN - msTrascorsi(mat);
  if (ms <= 0) return 0;
  return Math.ceil(ms / 60000);
}

function resetTimer(fase) {
  localStorage.removeItem(`${G.classe}_${G.mod}_g${fase+1}_timer_dir`);
  localStorage.removeItem(`${G.classe}_${G.mod}_g${fase+1}_timer_eco`);
}

// ═══════════════════════════
// BLOCCO 18 ORE
// ═══════════════════════════
const ORE_BLOCCO = 18;

function keyCompletato(fase) {
  return `${G.classe}_${G.mod}_g${fase+1}_completato_ts`;
}

function salvaCompletamento(fase) {
  localStorage.setItem(keyCompletato(fase), new Date().toISOString());
}

function getCompletamentoTs(fase) {
  const v = localStorage.getItem(keyCompletato(fase));
  return v ? new Date(v) : null;
}

function isGiornoSbloccato(fase) {
  if (fase === 0) return true;
  const tsPrecedente = getCompletamentoTs(fase - 1);
  if (!tsPrecedente) return false;
  const msPassati = new Date() - tsPrecedente;
  return msPassati >= ORE_BLOCCO * 3600 * 1000;
}

function oreRimanenti(fase) {
  const tsPrecedente = getCompletamentoTs(fase - 1);
  if (!tsPrecedente) return { ore: ORE_BLOCCO, min: 0 };
  const msPassati = new Date() - tsPrecedente;
  const msRimanenti = ORE_BLOCCO * 3600 * 1000 - msPassati;
  const ore = Math.floor(msRimanenti / 3600000);
  const min = Math.floor((msRimanenti % 3600000) / 60000);
  return { ore, min };
}

function pulsanteGiornoSuccessivo(fase) {
  if (isGiornoSbloccato(fase + 1)) {
    return `<button class="btn bp" onclick="goFase(${fase+1})">Vai al Giorno ${fase+2} →</button>`;
  } else {
    const r = oreRimanenti(fase + 1);
    return `<div class="blocco-countdown">
      🔒 Giorno ${fase+2} si sblocca tra <strong>${r.ore}h ${r.min}min</strong>
      <div style="font-size:12px;margin-top:4px;opacity:0.8;">Torna domani per continuare!</div>
    </div>`;
  }
}

function renderStepper(){
  const el=document.getElementById('stepper');el.innerHTML='';
  FL_LABEL.forEach((lbl,i)=>{
    const s=G.stati[i];
    // Verifica completamento sia in G.stati che in localStorage
    const snapKey=`${G.classe}_${G.mod}_g${i}`;
    const snapLS=JSON.parse(localStorage.getItem(snapKey)||'{}');
    const done=(s&&s.completata)||snapLS.completata;
    if(done&&s)s.completata=true; // sincronizzo G.stati
    const curr=i===G.fase;
    const sbloccato=isGiornoSbloccato(i);
    const lock=!done&&!curr&&!sbloccato;
    const wrap=mk('step-item');
    const b=document.createElement('button');
    b.className='step-btn'+(done?' ok':'')+(curr?' curr':'')+(lock?' locked':'');b.disabled=lock;
    b.innerHTML=`<div class="step-circle">${done?'✓':lock?'🔒':(i+1)}</div><div class="step-label">${lbl}</div>`;
    if(!lock&&!curr)b.onclick=()=>goFase(i);
    wrap.appendChild(b);
    if(i<FL_LABEL.length-1){const c=mk('step-conn'+(done?' done':''));wrap.appendChild(c);}
    el.appendChild(wrap);
  });
}

function goFase(i){
  G.fase=i;initSnap(i);
  document.getElementById('pbar').style.width=((i+1)/7*100)+'%';
  renderStepper();
  const el=document.getElementById('contenuto');el.innerHTML='';
  [bldG1,bldG2,bldG3,bldG4,bldG5,bldG6,bldG7][i](el);
  window.scrollTo({top:0,behavior:'smooth'});
}

function bsAdd(id){
  const inp=document.getElementById('bs-inp-'+id);
  const fb=document.getElementById('bs-fb-'+id);
  if(!inp||!fb)return;
  const raw=inp.value.trim();if(!raw)return;
  if(contieneVolg(raw)){fb.style.color='var(--err)';fb.textContent='⚠ Parola non adatta.';inp.value='';inp.focus();return;}
  const s=sn(G.fase);
  const bsObj=s['bs_'+id]||{parole:[],wc:false};
  if(bsObj.parole.some(p=>p.toLowerCase()===raw.toLowerCase())){
    fb.style.color='var(--gold)';fb.textContent='⚠ Già inserita.';inp.value='';inp.focus();return;
  }
  bsObj.parole.push(raw);s['bs_'+id]=bsObj;sv('bs_'+id,bsObj);
  fb.style.color='var(--ok)';fb.textContent='✓ "'+raw+'" aggiunta!';
  inp.value='';inp.focus();
  aggiornaTagsBs(id,bsObj);
}

function aggiornaTagsBs(id,bsObj){
  const el=document.getElementById('tags-'+id);
  const bar=document.getElementById('sog-'+id);
  const cnt=document.getElementById('cnt-'+id);
  const bw=document.getElementById('btn-wc-'+id);

    if(!bsObj.parole.length)el.innerHTML='<span style="color:var(--gray);font-size:.79rem;font-style:italic">Le tue parole...</span>';

function mostraWCDiretto(id){
  const wcWrap=document.getElementById('wc-'+id);if(wcWrap)wcWrap.style.display='block';
  const canvas=document.getElementById('wc-canvas-'+id);if(!canvas)return;
  const gi='g'+(G.fase+1);

  if(!wc){canvas.innerHTML='<span style="color:var(--gray)">Word cloud non disponibile.</span>';return;}
  canvas.innerHTML='';
  const tutte=[
    ...wc.chiave.map(w=>({w,t:'chiave',sz:1.25})),
    ...wc.comuni.map(w=>({w,t:'comune',sz:.95})),
    ...wc.raro.map(w=>({w,t:'raro',sz:.76})),
  ].sort(()=>Math.random()-.5);
  tutte.forEach(item=>{
    const span=document.createElement('span');
    span.className='wc-word wc-'+item.t;
    span.style.fontSize=item.sz+'rem';
    span.textContent=item.w;
    canvas.appendChild(span);
  });
  // Confronto
  const s=sn(G.fase);const bsObj=s['bs_'+id]||{parole:[]};
  const tutteParole=[...wc.chiave,...wc.comuni,...wc.raro].map(w=>w.toLowerCase());
  const trovate=bsObj.parole.filter(p=>tutteParole.some(w=>w.includes(p.toLowerCase())||p.toLowerCase().includes(w.split(' ')[0])));
  const cf=document.getElementById('wc-cf-'+id);
  if(cf){
    if(trovate.length===0)cf.innerHTML='Nessuna delle tue parole è nel word cloud — non è un problema. Significa che hai già idee tue sul tema. Studia la nuvola e capisci la logica.';
    else cf.innerHTML='Bene! Le tue parole <strong>'+trovate.join(', ')+'</strong> sono presenti nel word cloud.';
  }
}

function verificaEsercizi(mat,gi){
  const s=sn(G.fase);
  const nodi=mat==='dir'?NODI_DIR['g'+gi]||[]:NODI_ECO['g'+gi]||[];
  const cloze=mat==='dir'?CLOZE_DIR['g'+gi]||[]:CLOZE_ECO['g'+gi]||[];
  let ok=0,tot=nodi.length+cloze.length;
  nodi.forEach(n=>{
    const r=s.mappa[n.id];const nEl=document.getElementById('nl-'+n.id);const fEl=document.getElementById('nfb-'+n.id);
    if(!r){if(nEl)nEl.className='nl nko';if(fEl){fEl.style.color='var(--err)';fEl.textContent='⚠ Scegli.';}regErr('g'+G.fase+'_'+mat,n.id);return;}
    const corr=r===n.ok;if(nEl)nEl.className='nl '+(corr?'nok':'nko');
    if(nEl)nEl.querySelectorAll('.ob').forEach(b=>{if(b.textContent===n.ok)b.className='ob corr';else if(b.textContent===r&&!corr)b.className='ob sba';});
    if(fEl){fEl.style.color=corr?'var(--ok)':'var(--err)';fEl.textContent=corr?'✓':'✗ "'+n.ok+'".';}
    if(corr)ok++;else regErr('g'+(G.fase+1)+'_'+mat,n.id);
  });
  cloze.forEach(d=>{
    const r=s.cloze[d.id];const cq=document.getElementById('cq-'+d.id);const cf=document.getElementById('cfb-'+d.id);
    if(!r){if(cq)cq.className='cloze-q nko';if(cf){cf.style.color='var(--err)';cf.textContent='⚠ Scegli.';}regErr('g'+(G.fase+1)+'_'+mat,d.id);return;}
    const corr=r===d.ok;if(cq)cq.className='cloze-q '+(corr?'nok':'nko');
    if(cq)cq.querySelectorAll('.ob').forEach(b=>{if(b.textContent===d.ok)b.className='ob corr';else if(b.textContent===r&&!corr)b.className='ob sba';});
    if(cf){cf.style.color=corr?'var(--ok)':'var(--err)';cf.textContent=corr?'✓':'✗ "'+d.ok+'".';}
    if(corr)ok++;else regErr('g'+(G.fase+1)+'_'+mat,d.id);
  });
  const fb=document.getElementById('fb-eserc-'+mat);
  if(fb)fb.innerHTML=ok===tot?`<div class="callout co">✓ Tutto corretto! Ottimo.</div>`:`<div class="callout cw">${ok}/${tot} corretti. Rivedi le risposte in rosso.</div>`;
}

      <span id="fc-cnt-${mat}" style="font-size:.81rem;color:var(--gray);">1 / ${fcDel.length}</span>

    </div>

function fcDel(mat,gi){return (mat==='dir'?FC_DIR:FC_ECO).filter(f=>f.g<=gi+1);}

function renderFcMat(mat,gi){
  const s=sn(G.fase);const fcObj=s['fc_'+mat]||{idx:0,stati:{}};
  const cards=fcDel(mat,gi);const idx=fcObj.idx||0;const fc=cards[idx];if(!fc)return;
  const nuova=fc.g===gi+1;
  const fEl=document.getElementById('fc-f-'+mat);
  const bEl=document.getElementById('fc-b-'+mat);
  const card=document.getElementById('fc-card-'+mat);
  if(fEl){fEl.className='fcf'+(nuova?' '+mat:'');fEl.innerHTML=`<div><div class="fc-mat fc-mat-${mat}">${mat==='dir'?'📋 Diritto':'📊 Economia'}</div>${fc.d}<div class="fc-hint">clicca per girare</div></div>`;}
  if(bEl){bEl.className='fcb'+(nuova?' '+mat:'');bEl.innerHTML=`<div class="fcb-inner">${fc.r}</div>`;}
  if(card)card.classList.remove('flip');
  const st=document.getElementById('fc-st-'+mat);if(st)st.classList.add('hidden');
  const cnt=document.getElementById('fc-cnt-'+mat);if(cnt)cnt.textContent=(idx+1)+' / '+cards.length;
  const prv=document.getElementById('fc-prv-'+mat);if(prv)prv.disabled=idx===0;
  const nxt=document.getElementById('fc-nxt-'+mat);if(nxt)nxt.disabled=idx===cards.length-1;
  const prog=document.getElementById('fc-prog-'+mat);
  if(prog)prog.textContent=Object.keys(fcObj.stati||{}).length+' su '+cards.length+' valutate';
}

function fcFlip(mat,gi){
  const card=document.getElementById('fc-card-'+mat);if(!card)return;
  card.classList.toggle('flip');
  const st=document.getElementById('fc-st-'+mat);
  if(st){if(card.classList.contains('flip'))st.classList.remove('hidden');else st.classList.add('hidden');}
}

function fcVal(esito,mat,gi){
  const s=sn(G.fase);const fcObj=s['fc_'+mat]||{idx:0,stati:{}};
  const cards=fcDel(mat,gi);const idx=fcObj.idx||0;const fc=cards[idx];if(!fc)return;
  if(!fcObj.stati)fcObj.stati={};fcObj.stati[fc.id]=esito;
  if(esito==='rip')regErr('g'+(G.fase+1)+'_fc_'+mat,fc.id);
  s['fc_'+mat]=fcObj;sv('fc_'+mat,fcObj);
  if(idx<cards.length-1){fcObj.idx=idx+1;renderFcMat(mat,gi);}
  else{
    const st=document.getElementById('fc-st-'+mat);if(st)st.classList.add('hidden');
    const prog=document.getElementById('fc-prog-'+mat);
    if(prog)prog.innerHTML='<span style="color:var(--ok);font-weight:700;">✓ Flashcard completate!</span>';
  }
}

function fcNav(d,mat,gi){
  const s=sn(G.fase);const fcObj=s['fc_'+mat]||{idx:0};
  const cards=fcDel(mat,gi);const i=(fcObj.idx||0)+d;
  if(i<0||i>=cards.length)return;
  fcObj.idx=i;s['fc_'+mat]=fcObj;sv('fc_'+mat,fcObj);renderFcMat(mat,gi);
}

function bldQuaderno(mat,gi){
  const data=QUAD['g'+(gi+1)];

  const quadKey='quad_'+mat;

    <div class="callout cn mb8">✏️ Prendi carta e penna. ${data.intro}</div>
    <div id="quad-steps-${mat}"></div>
    <div id="quad-unlock-${mat}" class="quad-unlock hidden">

      <div style="font-weight:700;color:var(--navy);margin-top:4px;">${data[motivKey]}</div>
    </div>`;
  setTimeout(()=>{
    const el=document.getElementById('quad-steps-'+mat);if(!el)return;
    steps.forEach((step,i)=>{

      const div=document.createElement('div');
      div.className='quad-step'+(done?' done':'')+(step.cl?' '+step.cl:'');div.id='qs-'+step.id;

function togQuad(stepId,mat){
  const s=sn(G.fase);const quadKey='quad_'+mat;
  if(!s[quadKey])s[quadKey]={};
  s[quadKey][stepId]=!s[quadKey][stepId];sv(quadKey,s[quadKey]);
  const chk=document.getElementById('qchk-'+stepId);const qs=document.getElementById('qs-'+stepId);
  if(chk){if(s[quadKey][stepId]){chk.classList.add('on');chk.textContent='✓';}else{chk.classList.remove('on');chk.textContent='';}}
  if(qs){if(s[quadKey][stepId])qs.classList.add('done');else qs.classList.remove('done');}
  const data=QUAD['g'+(G.fase+1)];const steps=mat==='dir'?data.dir:data.eco;
  aggiornaQuadUnlock(mat,s,data,steps);
}

function aggiornaQuadUnlock(mat,s,data,steps){
  const quadKey='quad_'+mat;
  const tutte=steps.every(st=>s[quadKey]&&s[quadKey][st.id]);
  const el=document.getElementById('quad-unlock-'+mat);if(el){if(tutte)el.classList.remove('hidden');else el.classList.add('hidden');}
  // Se diritto completato, sblocca pulsante vai a eco
  if(mat==='dir'){
    const btn=document.getElementById('btn-vai-eco');if(btn)btn.disabled=!tutte;
    const mn=document.getElementById('mancano-dir');if(mn){const m=steps.filter(st=>!(s[quadKey]&&s[quadKey][st.id])).length;mn.textContent=tutte?'':m+' sezioni del quaderno Diritto ancora da completare.';}
  } else {
    const btn=document.getElementById('btn-completa');if(btn)btn.disabled=!tutte;
    const mn=document.getElementById('mancano-eco');if(mn){const m=steps.filter(st=>!(s[quadKey]&&s[quadKey][st.id])).length;mn.textContent=tutte?'':m+' sezioni del quaderno Economia ancora da completare.';}
  }
}

function completaFase(){
  // Controllo timer 20 minuti
  const mancaDir = minMancanti('dir');
  const mancaEco = minMancanti('eco');
  // Fallback di robustezza: se un timer non è mai stato avviato (0 ms trascorsi E mancano esattamente MINUTI_MIN),
  // quasi certamente è un bug di avvio del timer, non uno studente troppo veloce. Mostra un messaggio chiaro.
  const dirMai = msTrascorsi('dir') === 0 && mancaDir === MINUTI_MIN;
  const ecoMai = msTrascorsi('eco') === 0 && mancaEco === MINUTI_MIN;
  if(dirMai || ecoMai) {
    const sez = dirMai ? 'Diritto' : 'Economia';
    const msgEl = document.getElementById('msg-mancano');
    if(msgEl) {
      msgEl.innerHTML = `<strong>Problema tecnico — sezione ${sez}:</strong> il timer di questa sezione non è stato avviato correttamente. <strong>Ricarica la pagina</strong> (F5) e riprova. Se il problema persiste, avvisa il docente.`;
      msgEl.style.display='block';
    }
    return;
  }
  if(mancaDir > 0 || mancaEco > 0) {
    const sez = mancaDir > 0 ? 'Diritto' : 'Economia';
    const min = mancaDir > 0 ? mancaDir : mancaEco;
    const msgEl = document.getElementById('msg-mancano');
    if(msgEl) {
      msgEl.innerHTML = `<strong>Sezione ${sez}:</strong> La curva dell\'oblio di Ebbinghaus ci insegna che senza il tempo necessario per elaborare, si dimentica quasi tutto entro poche ore: la memoria trattiene ciò che viene elaborato con il tempo giusto. Affrettarsi significa dimenticare quasi tutto entro un\'ora. Hai ancora <strong>${min} minut${min===1?'o':'i'}</strong> da dedicare a questa sezione — usali bene, ne vale la pena. Rispetta il tuo apprendimento.`;
      msgEl.style.display='block';
    }
    return;
  }
  const s=sn(G.fase);s.completata=true;sv('completata',true);
  salvaCompletamento(G.fase);
  resetTimer(G.fase);
  send({nome:G.nome,classe:G.classe,mod:G.mod,giorno:G.fase+1,ts_start:G.ts_start||new Date().toISOString(),ts:new Date().toISOString(),ts_completamento:new Date().toISOString(),
    parole_dir:(s.bs_dir||{parole:[]}).parole,parole_eco:(s.bs_eco||{parole:[]}).parole,mappa:s.mappa,fc_dir:(s.fc_dir||{stati:{}}).stati,fc_eco:(s.fc_eco||{stati:{}}).stati});
  renderStepper();
  const msg=G.fase<6?`Giorno ${G.fase+1} completato! Giorno ${G.fase+2} sbloccato.`:`Modulo completato, ${G.nome}! 🏆`;
  let extra = '';
  extra += `<div class="tc mt12"><button class="btn bo" onclick="avviaRipassoErrori()" style="background:#5A8EC9;color:#fff;">🔁 I miei errori — ripassa</button></div>`;
  if(G.fase === 6){
    extra += `<div class="tc mt12"><button class="btn bp" onclick="avviaG8()" style="background:#5A9E58;color:#fff;">🎯 Ricostruisci il percorso — G8</button></div>`;
  }
  document.getElementById('contenuto').innerHTML=`<div class="card">
    <div class="motiv"><div class="em">${G.fase<6?'🎉':'🏆'}</div><p>${msg}</p></div>
    <div class="callout co mt12">${G.fase<6?pulsanteGiornoSuccessivo(G.fase):'Tutti i giorni completati! 🏆'}</div>
    <div class="tc mt12"><button class="btn bo" onclick="goFase(${G.fase})">← Rivedi il Giorno ${G.fase+1}</button></div>
    ${extra}
  </div>`;
}

function costruisciGiorno(el,gi,spiegDirHtml,spiegEcoHtml){
  const s=sn(gi);
  // Apertura
  el.appendChild(bldApertura(gi));

  // ── SEZIONE DIRITTO ──
  const blkDir=mk('sezione-blk dir');
  const innerDir=mk('sezione-inner');
  innerDir.innerHTML=`<div class="sezione-hdr dir"><h2>📋 DIRITTO</h2><span class="timer-pill dir">⏱ 20 minuti</span></div>`;
  // BS dir
  innerDir.appendChild(bldBs('dir',gi));
  // Contenuto dir (nascosto finché WC non completato)
  const dirContent=mk('hidden');dirContent.id='sezione-dir-content';
  dirContent.appendChild(bldMappaSvg('dir',gi+1,'intro'));
  dirContent.appendChild(bldSpieg('dir',spiegDirHtml));
  dirContent.appendChild(bldEsercizi('dir',gi+1));
  dirContent.appendChild(bldFlashcard('dir',gi));
  dirContent.appendChild(bldMappaSvg('dir',gi+1,'riepilogo'));
  dirContent.appendChild(bldCaso('dir',gi+1));
  dirContent.appendChild(bldQuaderno('dir',gi));
  dirContent.appendChild(bldTransizione());
  innerDir.appendChild(dirContent);
  blkDir.appendChild(innerDir);
  el.appendChild(blkDir);

  // ── SEZIONE ECONOMIA ──
  const blkEco=mk('sezione-blk eco hidden');blkEco.id='sezione-eco';
  const innerEco=mk('sezione-inner');
  innerEco.innerHTML=`<div class="sezione-hdr eco"><h2>📊 ECONOMIA</h2><span class="timer-pill eco">⏱ 20 minuti</span></div>`;
  innerEco.appendChild(bldBs('eco',gi));
  const ecoContent=mk('hidden');ecoContent.id='sezione-eco-content';
  ecoContent.appendChild(bldMappaSvg('eco',gi+1,'intro'));
  ecoContent.appendChild(bldSpieg('eco',spiegEcoHtml));
  ecoContent.appendChild(bldEsercizi('eco',gi+1));
  ecoContent.appendChild(bldFlashcard('eco',gi));
  ecoContent.appendChild(bldMappaSvg('eco',gi+1,'riepilogo'));
  ecoContent.appendChild(bldCaso('eco',gi+1));
  ecoContent.appendChild(bldQuaderno('eco',gi));
  innerEco.appendChild(ecoContent);
  blkEco.appendChild(innerEco);
  el.appendChild(blkEco);

  // Chiusura
  el.appendChild(bldChiusura(gi));

  // Ripristina stati
  setTimeout(()=>{
    if(s.bs_dir&&s.bs_dir.wc){const dc=document.getElementById('sezione-dir-content');if(dc)dc.classList.remove('hidden');mostraWCDiretto('dir');}
    if(s.bs_eco&&s.bs_eco.wc){mostraWCDiretto('eco');}
    aggiornaTagsBs('dir',s.bs_dir||{parole:[]});
    aggiornaTagsBs('eco',s.bs_eco||{parole:[]});
    if(s.bs_dir&&s.bs_dir.wc){renderFcMat('dir',gi);}
    if(s.bs_eco&&s.bs_eco.wc){renderFcMat('eco',gi);}
    const data=QUAD['g'+(gi+1)];
    if(data){
      aggiornaQuadUnlock('dir',s,data,data.dir);
      aggiornaQuadUnlock('eco',s,data,data.eco);
    }
  },0);
}

  loadErr();

  const tutte=[...Object.values(NODI_DIR).flat(),...Object.values(NODI_ECO).flat(),...Object.values(CLOZE_DIR).flat(),...Object.values(CLOZE_ECO).flat()];

function verificaRipasso(mat){
  const domande=(window._ripasso&&window._ripasso[mat])||[];
  const s=sn(G.fase);let ok=0;
  const fb=document.getElementById('rip-fb-'+mat);
  domande.forEach(q=>{
    const r=s.mappa&&s.mappa['rip_'+q.id];
    const rq=document.getElementById('rq-'+q.id);const rf=document.getElementById('rfb-'+q.id);
    if(!r){if(rq)rq.className='rip-q nko';if(rf){rf.style.color='var(--err)';rf.textContent='⚠ Scegli.';}return;}
    const corr=r===q.ok;
    if(rq)rq.className='rip-q '+(corr?'nok':'nko');
    if(rq)rq.querySelectorAll('.ob').forEach(b=>{if(b.textContent===q.ok)b.className='ob corr';else if(b.textContent===r&&!corr)b.className='ob sba';});
    if(rf){rf.style.color=corr?'var(--ok)':'var(--err)';rf.textContent=corr?'✓':'✗ "'+q.ok+'".';}
    if(corr)ok++;
  });
  if(fb){
    const msg=ok===domande.length?`<div class="callout co">✓ Ripasso ${mat==='dir'?'Diritto':'Economia'} perfetto!</div>`:ok>=domande.length/2?`<div class="callout cw">${ok}/${domande.length}. Quasi!</div>`:`<div class="callout ce">${ok}/${domande.length}. Rivedi la spiegazione.</div>`;
    fb.innerHTML=msg;
    // Sblocca flashcard e quaderno
    const dc=document.getElementById('sezione-dir-content');if(dc&&mat==='dir')dc.classList.remove('hidden');
    const ec=document.getElementById('sezione-eco-content');if(ec&&mat==='eco')ec.classList.remove('hidden');
  }
}

const G8 = { risposte: {}, treParole: ['','',''], tsStart: null };

function g8HaCompletatoG7() {
  const tsG7 = localStorage.getItem(`${G.classe}_${G.mod}_g7_completato_ts`);
  return !!tsG7;
}
function g8PassateOre18DaG7() {
  const tsG7 = localStorage.getItem(`${G.classe}_${G.mod}_g7_completato_ts`);
  if(!tsG7) return false;
  return (new Date() - new Date(tsG7)) >= 18 * 3600 * 1000;
}
function g8OreRimanentiDaG7() {
  const tsG7 = localStorage.getItem(`${G.classe}_${G.mod}_g7_completato_ts`);
  if(!tsG7) return {ore:18, min:0};
  const rim = 18*3600*1000 - (new Date() - new Date(tsG7));
  if(rim <= 0) return {ore:0, min:0};
  return {ore: Math.floor(rim/3600000), min: Math.floor((rim%3600000)/60000)};
}

function avviaG8(){
  if(!g8HaCompletatoG7()){
    alert('Il G8 si sblocca solo dopo aver completato il Giorno 7.');

    const r = g8OreRimanentiDaG7();

        const sel = `<select id="g8-cp-${fi}-${b.id}" style="padding:4px 8px;border-radius:5px;border:1px solid #999;font-size:.9rem;margin:0 4px;">
          <option value="">__</option>
          ${opt.map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>`;
        html = html.replace(`[${b.id}]`, sel);
      });
      return `<div style="margin-bottom:12px;padding:12px;background:#F5F5F5;border-radius:8px;font-size:.95rem;line-height:1.8;">${html}</div>`;
    }).join('')}
    <div class="tc mt10"><button class="btn bp" onclick="g8VerificaCompleta()">Verifica →</button></div>
    <div id="g8-cp-fb" class="mt8"></div>
  </div>`;
}

function g8VerificaCompleta(){
  const d = G8_SECONDE.completa;
  let ok = 0, tot = 0;
  d.frasi.forEach((f,fi)=>{
    f.buchi.forEach(b=>{
      tot++;
      const sel = document.getElementById(`g8-cp-${fi}-${b.id}`);
      if(sel && sel.value === b.giusto) ok++;
    });
  });
  G8.risposte.completa = `${ok}/${tot}`;
  const fb = document.getElementById('g8-cp-fb');
  fb.innerHTML = `<div class="callout ${ok===tot?'co':'cb'} mt8">${ok===tot?'✓':'•'} ${ok} su ${tot} parole corrette.</div>`;
}

function g8RenderTreParole(){
  const el = document.getElementById('g8-att6');
  el.innerHTML = `<div class="card">
    <div class="card-title"><div class="c-icon">💭</div>Tre parole di sintesi</div>
    <p style="font-size:.88rem;color:#444;line-height:1.5;margin-bottom:10px;">Scrivi tre parole che secondo te riassumono tutto il percorso. Non c'è una risposta giusta: scegli quelle che per te contano di più.</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <input type="text" id="g8-tp-0" placeholder="Prima parola" maxlength="30" style="padding:10px;border-radius:6px;border:1px solid #CCC;font-size:.92rem;">
      <input type="text" id="g8-tp-1" placeholder="Seconda parola" maxlength="30" style="padding:10px;border-radius:6px;border:1px solid #CCC;font-size:.92rem;">
      <input type="text" id="g8-tp-2" placeholder="Terza parola" maxlength="30" style="padding:10px;border-radius:6px;border:1px solid #CCC;font-size:.92rem;">
    </div>
  </div>`;
}

function g8RenderFinale(){
  const el = document.getElementById('g8-finale');
  el.innerHTML = `<div class="card">
    <div class="tc"><button class="btn bp" onclick="g8Invia()" style="background:#5A9E58;color:#fff;font-size:1rem;padding:14px 22px;">✓ Ho completato il G8</button></div>
    <div id="g8-end-fb" class="mt10"></div>
  </div>`;
}

function g8Invia(){
  const p0 = (document.getElementById('g8-tp-0')||{}).value || '';
  const p1 = (document.getElementById('g8-tp-1')||{}).value || '';
  const p2 = (document.getElementById('g8-tp-2')||{}).value || '';
  G8.treParole = [p0.trim(), p1.trim(), p2.trim()].filter(x=>x.length>0);
  if(CFG.gasUrl){
    try {
      let iframe=document.getElementById('_gas_ifr');
      if(!iframe){iframe=document.createElement('iframe');iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';document.body.appendChild(iframe);}
      const form=document.createElement('form');form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
      const payload = {
        tipo: 'g8', nome: G.nome, classe: G.classe, mod: G.mod,
        ts_start: G8.tsStart, ts: new Date().toISOString(),
        treParole: G8.treParole, attivita: G8.risposte
      };
      const inp=document.createElement('input');inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(payload);
      form.appendChild(inp);document.body.appendChild(form);form.submit();
      setTimeout(()=>{try{form.remove();}catch(e){}},3000);
    } catch(e){}
  }
  const fb = document.getElementById('g8-end-fb');
  fb.innerHTML = `<div class="callout co" style="text-align:center;padding:18px;">
    <div style="font-size:2rem;margin-bottom:6px;">🎯</div>
    <strong>Hai ricostruito il percorso. Buon lavoro, ${G.nome}.</strong>
  </div>
  <div class="tc mt12"><button class="btn bo" onclick="goFase(6)">← Torna al Giorno 7</button></div>`;
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

// ═══════════════════════════
// RIPASSO ERRORI cross-giornata
// ═══════════════════════════
const RIPASSO = { domande: [], indice: 0, corretti: 0, tsStart: null };

function avviaRipassoErrori(){
  loadErr();
  const tutti = [...G.errori].sort((a,b)=>b.tentativiErrati-a.tentativiErrati);
  if(tutti.length === 0){
    document.getElementById('contenuto').innerHTML = `<div class="card" style="text-align:center;padding:28px 20px;">
      <div style="font-size:3rem;">✨</div>
      <h2 style="color:var(--navy);font-size:1.2rem;margin:10px 0;">Nessun errore da ripassare</h2>
      <p style="color:var(--slate);font-size:.9rem;line-height:1.55;">Finora hai risposto correttamente a tutto. Se sbaglierai in future giornate, qui troverai le domande da rifare.</p>
      <div class="tc mt12"><button class="btn bo" onclick="goFase(${G.fase})">← Torna indietro</button></div>
    </div>`;
    return;
  }
  const tutteQ = [...Object.values(NODI_DIR).flat(), ...Object.values(NODI_ECO).flat(),
                  ...Object.values(CLOZE_DIR).flat(), ...Object.values(CLOZE_ECO).flat()];
  const rip = tutti
    .map(e => { const q = tutteQ.find(x => x.id === e.domandaId); return q ? {...q, te:e.tentativiErrati} : null; })
    .filter(Boolean)
    .slice(0, 8);
  RIPASSO.domande = rip;
  RIPASSO.indice = 0;
  RIPASSO.corretti = 0;
  RIPASSO.tsStart = new Date().toISOString();
  renderRipasso();
}

function renderRipasso(){
  const el = document.getElementById('contenuto');
  if(RIPASSO.indice >= RIPASSO.domande.length){
    finalizzaRipasso();
    return;
  }
  const q = RIPASSO.domande[RIPASSO.indice];
  const opz = q.opz || q.scelte || [];
  el.innerHTML = `
    <div class="card">
      <div class="card-title"><div class="c-icon">🔁</div>I miei errori — ${RIPASSO.indice+1}/${RIPASSO.domande.length}</div>
      <p style="font-size:.82rem;color:#888;margin-bottom:8px;">Domanda sbagliata ${q.te} volt${q.te>1?'e':'a'} in passato.</p>
      <div style="background:#F5F5F5;padding:14px;border-radius:8px;margin-bottom:12px;font-size:.95rem;line-height:1.55;">
        <strong>${q.pre || q.testo || ''}</strong> ${q.post || ''}
      </div>
      <div class="opz">
        ${opz.map(o => `<button class="ob" onclick="rispondiRipasso('${o.replace(/'/g,"\\'")}', '${q.ok.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
      </div>
      <div id="rip-fb" class="mt10"></div>
    </div>
  `;
  window.scrollTo({top:0, behavior:'smooth'});
}

function rispondiRipasso(scelta, giusto){
  const fb = document.getElementById('rip-fb');
  if(scelta === giusto){
    RIPASSO.corretti++;
    fb.innerHTML = `<div class="callout co">✓ Corretto! Continua.</div>
      <div class="tc mt8"><button class="btn bp" onclick="RIPASSO.indice++;renderRipasso()">Prossima →</button></div>`;
  } else {
    fb.innerHTML = `<div class="callout cb">✗ Non questa volta. La risposta giusta era: <strong>${giusto}</strong></div>
      <div class="tc mt8"><button class="btn bo" onclick="RIPASSO.indice++;renderRipasso()">Prossima →</button></div>`;
  }
}

function finalizzaRipasso(){
  const tot = RIPASSO.domande.length;
  const ok = RIPASSO.corretti;
  if(CFG.gasUrl){
    try {
      let iframe=document.getElementById('_gas_ifr');
      if(!iframe){iframe=document.createElement('iframe');iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';document.body.appendChild(iframe);}
      const form=document.createElement('form');form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
      const payload = {
        tipo: 'ripasso', nome: G.nome, classe: G.classe, mod: G.mod,
        ts_start: RIPASSO.tsStart, ts: new Date().toISOString(),
        ripassati: tot, corretti: ok
      };
      const inp=document.createElement('input');inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(payload);
      form.appendChild(inp);document.body.appendChild(form);form.submit();
      setTimeout(()=>{try{form.remove();}catch(e){}},3000);
    } catch(e){}
  }
  document.getElementById('contenuto').innerHTML = `<div class="card" style="text-align:center;padding:26px 20px;">
    <div style="font-size:3rem;">🔁</div>
    <h2 style="color:var(--navy);font-size:1.2rem;margin:10px 0;">Ripasso completato</h2>
    <p style="color:var(--slate);font-size:.95rem;">Hai risposto bene a <strong>${ok}/${tot}</strong> domande.</p>
    <p style="color:var(--slate);font-size:.85rem;line-height:1.5;margin-top:10px;">Gli errori che ripeti più spesso torneranno la prossima volta. Ripassare non è tempo perso: è come fissare quello che hai imparato.</p>
    <div class="tc mt14"><button class="btn bo" onclick="goFase(${G.fase})">← Torna al Giorno ${G.fase+1}</button></div>
  </div>`;
}
</script>
