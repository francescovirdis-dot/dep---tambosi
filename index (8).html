// ─── Stato runtime G9 ───
const G9 = { casoCorrente: 0, risposte: {}, mappe: {}, tsStart: null, DATI: null };

function g9GetDati() {
  if (typeof G9_SECONDE !== 'undefined' && G.mod && G.mod.indexOf('sec') >= 0) return G9_SECONDE;
  if (typeof G9_PRIME !== 'undefined') return G9_PRIME;
  return null;
}

function g9HaCompletatoG8() {
  const k = `${G.classe}_${G.mod}_g8_completato_ts`;
  return !!localStorage.getItem(k);
}
function g9PassateOre18DaG8() {
  const k = `${G.classe}_${G.mod}_g8_completato_ts`;
  const v = localStorage.getItem(k);
  if (!v) return false;
  return (new Date() - new Date(v)) >= 18 * 3600 * 1000;
}
function g9OreRimanentiDaG8() {
  const k = `${G.classe}_${G.mod}_g8_completato_ts`;
  const v = localStorage.getItem(k);
  if (!v) return {ore:18, min:0};
  const rim = 18*3600*1000 - (new Date() - new Date(v));
  if (rim <= 0) return {ore:0, min:0};
  return {ore: Math.floor(rim/3600000), min: Math.floor((rim%3600000)/60000)};
}

function avviaG9() {
  if (!g9HaCompletatoG8()) {
    alert('Il G9 "Carte in tavola" si sblocca solo dopo aver completato il G8.');
    return;
  }
  if (!g9PassateOre18DaG8()) {
    const r = g9OreRimanentiDaG8();
    document.getElementById('contenuto').innerHTML = `<div class="card" style="text-align:center;padding:28px 20px;">
      <div style="font-size:3rem;">🎯</div>
      <h2 style="color:var(--navy);font-size:1.2rem;margin:10px 0;">Ti aspetta la sezione "Carte in tavola"</h2>
      <p style="color:var(--slate);font-size:.92rem;line-height:1.55;margin:10px 0;">Per applicare quello che sai a casi reali. Si sblocca tra:</p>
      <div style="background:var(--navy);color:var(--teal);border-radius:12px;padding:20px;margin:14px 0;font-size:1.9rem;font-weight:900;">${r.ore}h ${r.min}min</div>
      <p style="color:var(--slate);font-size:.88rem;line-height:1.55;">Le cose imparate si sedimentano con il tempo. Torna quando il countdown è a zero e porta con te tutto quello che hai costruito nel percorso.</p>
      <div class="tc mt12"><button class="btn bo" onclick="goFase(6)">← Rivedi il Giorno 7</button></div>
    </div>`;
    return;
  }
  const d = g9GetDati();
  if (!d) {
    alert('Contenuti G9 non disponibili.');
    return;
  }
  G9.DATI = d;
  G9.casoCorrente = 0;
  G9.risposte = {};
  G9.mappe = {};
  G9.tsStart = new Date().toISOString();
  renderG9Caso();
}

function renderG9Caso() {
  const d = G9.DATI;
  const idx = G9.casoCorrente;
  const caso = d.casi[idx];
  const el = document.getElementById('contenuto');
  el.innerHTML = `
    <div class="card">
      <div style="font-size:.82rem;color:#888;margin-bottom:4px;">${d.titoloSezione} — ${idx+1}/${d.casi.length}</div>
      <div style="font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:10px;">${caso.emoji} ${caso.titolo}</div>
      <div class="callout cs" style="margin-bottom:10px;">
        <div style="font-size:.78rem;color:#666;margin-bottom:4px;">🗝️ Parole chiave per ragionare:</div>
        <div style="font-size:.85rem;color:#333;font-style:italic;">${caso.paroleChiave}</div>
      </div>
      <div style="font-size:.95rem;line-height:1.6;color:#333;margin-bottom:12px;">${caso.scenario}</div>
      <div style="font-weight:700;color:var(--navy);font-size:.95rem;margin-bottom:12px;">${caso.ragiona}</div>
      <div id="g9-domande"></div>
      <div id="g9-esito"></div>
    </div>
    <div id="g9-mappa-wrap"></div>
  `;
  // Render domande
  const ddom = document.getElementById('g9-domande');
  caso.domande.forEach((d,i) => {
    const box = document.createElement('div');
    box.style.cssText = 'margin-bottom:14px;padding:12px;background:#F8F9FB;border-radius:8px;';
    box.innerHTML = `
      <div style="font-weight:600;font-size:.93rem;margin-bottom:8px;">Domanda ${i+1}. ${d.q}</div>
      <div class="opz" id="g9-opz-${idx}-${i}"></div>
      <div id="g9-fb-${idx}-${i}" class="mt6" style="font-size:.85rem;"></div>
    `;
    ddom.appendChild(box);
    const opzEl = document.getElementById(`g9-opz-${idx}-${i}`);
    d.opzioni.forEach((o, oi) => {
      const b = document.createElement('button');
      b.className = 'ob';
      b.textContent = o;
      b.style.textAlign = 'left';
      b.style.whiteSpace = 'normal';
      b.style.lineHeight = '1.4';
      b.onclick = () => g9RispostaCaso(idx, i, oi);
      opzEl.appendChild(b);
    });
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function g9RispostaCaso(casoIdx, domIdx, sceltaIdx) {
  const caso = G9.DATI.casi[casoIdx];
  const dom = caso.domande[domIdx];
  const keyCaso = caso.id;
  if (!G9.risposte[keyCaso]) G9.risposte[keyCaso] = {};
  if (G9.risposte[keyCaso][domIdx] !== undefined) return;
  G9.risposte[keyCaso][domIdx] = sceltaIdx;
  const opzContainer = document.getElementById(`g9-opz-${casoIdx}-${domIdx}`);
  if (opzContainer) {
    [...opzContainer.children].forEach((btn, j) => {
      btn.disabled = true;
      btn.style.cursor = 'default';
      if (j === dom.giusta) btn.style.background = '#D4EDDA';
      if (j === sceltaIdx && j !== dom.giusta) btn.style.background = '#F8D7DA';
    });
  }
  const fb = document.getElementById(`g9-fb-${casoIdx}-${domIdx}`);
  if (fb) {
    if (sceltaIdx === dom.giusta) fb.innerHTML = '<span style="color:#155724;">✓ Corretto.</span>';
    else fb.innerHTML = `<span style="color:#721c24;">✗ La risposta corretta era: "${dom.opzioni[dom.giusta]}"</span>`;
  }
  // Se tutte risposte date, mostra feedback+mappa
  if (Object.keys(G9.risposte[keyCaso]).length === caso.domande.length) {
    const esitoEl = document.getElementById('g9-esito');
    esitoEl.innerHTML = `
      <div class="callout co mt10">
        <strong>Riflessione:</strong> ${caso.feedback}
      </div>
    `;
    renderG9Mappa();
  }
}

function renderG9Mappa() {
  const caso = G9.DATI.casi[G9.casoCorrente];
  const mappa = caso.mappa;
  const wrap = document.getElementById('g9-mappa-wrap');
  wrap.innerHTML = `
    <div class="card">
      <div style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:8px;">🗺️ Carte in tavola — completa la mappa</div>
      <div style="font-size:.88rem;color:#444;line-height:1.5;margin-bottom:12px;">Tocca prima una parola qui sotto, poi il riquadro vuoto dove vuoi metterla.</div>
      <div id="g9-mappa-nodi" style="background:#F5F5F5;padding:14px;border-radius:10px;margin-bottom:12px;"></div>
      <div style="font-size:.82rem;color:#666;margin-bottom:6px;">Parole da collocare:</div>
      <div id="g9-mappa-parole" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
      <div class="tc"><button class="btn bp" id="g9-mappa-verifica" onclick="g9VerificaMappa()">Verifica mappa →</button></div>
      <div id="g9-mappa-fb" class="mt8"></div>
    </div>
  `;
  // Render nodi
  const nodiEl = document.getElementById('g9-mappa-nodi');
  mappa.nodi.forEach((n, idx) => {
    const div = document.createElement('div');
    if (n.tipo === 'fisso') {
      div.style.cssText = 'background:var(--navy);color:var(--white);padding:12px;border-radius:8px;text-align:center;font-weight:700;margin:4px auto;max-width:92%;';
      div.innerHTML = `${n.testo}${n.sub ? `<div style="font-size:.75rem;font-weight:400;color:var(--teal);margin-top:3px;">${n.sub}</div>` : ''}`;
    } else if (n.tipo === 'connettore') {
      div.style.cssText = 'text-align:center;color:#666;font-size:.82rem;font-style:italic;padding:4px 0;';
      div.innerHTML = `↓ ${n.testo}`;
    } else if (n.tipo === 'buco') {
      div.className = 'g9-mappa-buco';
      div.dataset.id = n.id;
      div.style.cssText = 'background:#FFF;color:#999;padding:14px;border:2px dashed #B8C3D9;border-radius:8px;text-align:center;font-weight:700;margin:4px auto;max-width:92%;min-height:44px;cursor:pointer;';
      div.innerHTML = `<span class="buco-content">[ ? ]</span>${n.sub ? `<div style="font-size:.72rem;font-weight:400;color:#999;margin-top:3px;">${n.sub}</div>` : ''}`;
      div.onclick = () => g9SelezionaBuco(n.id);
    }
    nodiEl.appendChild(div);
  });
  // Render parole
  const parEl = document.getElementById('g9-mappa-parole');
  mappa.parole.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'g9-parola';
    b.dataset.parola = p;
    b.dataset.idx = i;
    b.textContent = p;
    b.style.cssText = 'background:#E1EFFA;color:var(--navy);border:2px solid #5A8EC9;padding:8px 14px;border-radius:20px;font-size:.88rem;font-weight:600;cursor:pointer;';
    b.onclick = () => g9SelezionaParola(i, p);
    parEl.appendChild(b);
  });
  // Stato runtime mappa
  G9.mappeCorrente = { paroleUsate: {}, buchi: {}, paroleSelezionata: null };
}

function g9SelezionaParola(idx, parola) {
  if (G9.mappeCorrente.paroleUsate[idx]) return;
  G9.mappeCorrente.paroleSelezionata = {idx, parola};
  document.querySelectorAll('.g9-parola').forEach((b,i) => {
    if (G9.mappeCorrente.paroleUsate[i]) return;
    b.style.background = (i === idx) ? '#FFE082' : '#E1EFFA';
  });
}

function g9SelezionaBuco(bucoId) {
  const sel = G9.mappeCorrente.paroleSelezionata;
  if (!sel) return;
  // Se il buco era già pieno, rimetto la parola precedente tra le disponibili
  if (G9.mappeCorrente.buchi[bucoId]) {
    const prevIdx = G9.mappeCorrente.buchi[bucoId].idx;
    G9.mappeCorrente.paroleUsate[prevIdx] = false;
    const pb = document.querySelector(`.g9-parola[data-idx="${prevIdx}"]`);
    if (pb) { pb.style.background = '#E1EFFA'; pb.disabled = false; pb.style.opacity = '1'; }
  }
  G9.mappeCorrente.buchi[bucoId] = sel;
  G9.mappeCorrente.paroleUsate[sel.idx] = true;
  const bucoEl = document.querySelector(`.g9-mappa-buco[data-id="${bucoId}"]`);
  if (bucoEl) {
    const content = bucoEl.querySelector('.buco-content');
    if (content) content.textContent = sel.parola;
    bucoEl.style.color = 'var(--navy)';
    bucoEl.style.borderStyle = 'solid';
    bucoEl.style.background = '#E8F5E9';
  }
  const parBtn = document.querySelector(`.g9-parola[data-idx="${sel.idx}"]`);
  if (parBtn) { parBtn.style.opacity = '0.4'; parBtn.disabled = true; }
  G9.mappeCorrente.paroleSelezionata = null;
}

function g9VerificaMappa() {
  const caso = G9.DATI.casi[G9.casoCorrente];
  const mappa = caso.mappa;
  const buchi = G9.mappeCorrente.buchi;
  let ok = 0, tot = mappa.soluzione.length;
  mappa.soluzione.forEach((sol, i) => {
    const bucoId = i + 1;
    if (buchi[bucoId] && buchi[bucoId].parola === sol) ok++;
  });
  const fb = document.getElementById('g9-mappa-fb');
  if (ok === tot) {
    fb.innerHTML = `<div class="callout co"><strong>✓</strong> ${mappa.feedback}</div>
      <div class="tc mt10"><button class="btn bp" onclick="g9Prossimo()">${G9.casoCorrente < G9.DATI.casi.length - 1 ? 'Prossimo caso →' : 'Chiudi il percorso →'}</button></div>`;
  } else {
    fb.innerHTML = `<div class="callout cb">${ok}/${tot} riquadri corretti. Rileggi le domande e riprova.</div>
      <div class="tc mt8"><button class="btn bo" onclick="g9ResetMappa()">Riprova la mappa</button>
      <button class="btn bp" onclick="g9Prossimo()" style="margin-left:8px;">${G9.casoCorrente < G9.DATI.casi.length - 1 ? 'Vai avanti →' : 'Chiudi →'}</button></div>`;
  }
  // salvo esito
  if (!G9.mappe) G9.mappe = {};
  G9.mappe[caso.id] = `${ok}/${tot}`;
}

function g9ResetMappa() {
  renderG9Mappa();
}

function g9Prossimo() {
  if (G9.casoCorrente < G9.DATI.casi.length - 1) {
    G9.casoCorrente++;
    renderG9Caso();
  } else {
    g9Chiusura();
  }
}

function g9Chiusura() {
  const d = G9.DATI.chiusura;
  const saluto = d.saluto.replace('{nome}', G.nome);
  // invio al server
  if (CFG.gasUrl) {
    try {
      let iframe=document.getElementById('_gas_ifr');
      if(!iframe){iframe=document.createElement('iframe');iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';document.body.appendChild(iframe);}
      const form=document.createElement('form');form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
      // Riuso tipo=g8 per il server (stesso formato), ma marco come G9 in treParole
      const esitiCasi = {};
      G9.DATI.casi.forEach(c => {
        const r = G9.risposte[c.id] || {};
        let ok = 0;
        c.domande.forEach((dom,i) => { if (r[i] === dom.giusta) ok++; });
        esitiCasi[c.id] = `${ok}/${c.domande.length}`;
      });
      const attivitaFinale = { _tipo: 'G9', ...esitiCasi, mappe: G9.mappe };
      const payload = {
        tipo: 'g8',  // riuso canale server esistente
        nome: G.nome, classe: G.classe, mod: G.mod,
        ts_start: G9.tsStart, ts: new Date().toISOString(),
        treParole: ['G9', 'casi_applicati', 'carte_in_tavola'],
        attivita: attivitaFinale
      };
      const inp=document.createElement('input');inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(payload);
      form.appendChild(inp);document.body.appendChild(form);form.submit();
      setTimeout(()=>{try{form.remove();}catch(e){}},3000);
    } catch(e){}
  }
  // salvo ts G9 in localStorage
  try { localStorage.setItem(`${G.classe}_${G.mod}_g9_completato_ts`, new Date().toISOString()); } catch(e){}
  document.getElementById('contenuto').innerHTML = `
    <div class="card" style="text-align:center;padding:28px 20px;">
      <div style="font-size:3rem;">🏆</div>
      <h2 style="color:var(--navy);font-size:1.3rem;margin:10px 0 4px;">${saluto}</h2>
      <div style="color:var(--slate);font-size:.95rem;font-style:italic;margin-bottom:18px;">${d.sottotitolo}</div>
      <div style="background:#E3F2E1;padding:16px;border-radius:10px;margin:14px 0;text-align:left;">
        <div style="font-weight:700;color:#2E5C1E;font-size:1rem;margin-bottom:8px;">${d.titoloCompletamento}</div>
        <div style="color:#333;font-size:.92rem;line-height:1.6;">${d.testo}</div>
      </div>
      <div style="color:var(--navy);font-size:.95rem;font-weight:600;font-style:italic;margin:14px 0;">${d.invito}</div>
      <div class="tc mt14" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn bo" onclick="goFase(6)">← Torna al Giorno 7</button>
        <button class="btn bp" onclick="g9ChiudiApp()" style="background:var(--navy);color:#fff;">Chiudi l'app</button>
      </div>
    </div>
  `;
  window.scrollTo({top:0, behavior:'smooth'});
}

function g9ChiudiApp() {
  // Torna alla schermata login
  document.getElementById('screen-app').classList.add('hidden');
  document.getElementById('screen-login').classList.remove('hidden');
  // Reset form
  const inpNome = document.getElementById('inp-nome');
  if (inpNome) inpNome.value = '';
  window.scrollTo({top:0, behavior:'instant'});
}
