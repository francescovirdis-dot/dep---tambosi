<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diritto e Economia Politica — ITE Tambosi</title>
<style>
:root{
  --navy:#1A2340;--teal:#2DC5A2;--gold:#C9A84C;--slate:#3D5166;
  --light:#E8F4F1;--bg:#F5F7FA;--white:#FFFFFF;--gray:#8A96A3;
  --text:#222222;--err:#C0392B;--ok:#1A7A4A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
#header{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
#header h1{color:var(--white);font-size:.95rem;font-weight:700;letter-spacing:.03em;}
#header-info{color:var(--teal);font-size:.82rem;}

/* STEPPER */
#stepper{background:var(--white);border-bottom:2px solid var(--light);padding:12px 20px;display:flex;align-items:center;overflow-x:auto;position:sticky;top:49px;z-index:99;}
.step-item{display:flex;align-items:center;}
.step-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:3px 7px;cursor:not-allowed;}
.step-btn.ok,.step-btn.curr{cursor:pointer;}
.step-btn.curr{cursor:default;}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;border:2px solid #CDD1D9;color:var(--gray);background:var(--white);transition:all .2s;}
.step-btn.ok .step-circle{background:var(--teal);border-color:var(--teal);color:var(--white);}
.step-btn.curr .step-circle{background:var(--navy);border-color:var(--navy);color:var(--white);}
.step-label{font-size:.6rem;color:var(--gray);white-space:nowrap;}
.step-btn.curr .step-label{color:var(--navy);font-weight:700;}
.step-btn.ok .step-label{color:var(--teal);}
.step-conn{width:20px;height:2px;background:#DDE1E7;flex-shrink:0;}
.step-conn.done{background:var(--teal);}

/* PROGRESS */
#pbar-wrap{height:4px;background:#E0E4EA;overflow:hidden;}
#pbar{height:100%;background:var(--teal);transition:width .6s;}

/* MAIN */
#main{max-width:800px;margin:0 auto;padding:24px 16px 100px;}

/* CARD */
.card{background:var(--white);border-radius:12px;box-shadow:0 2px 14px rgba(26,35,64,.07);padding:26px;margin-bottom:20px;}
.card.locked{opacity:.5;pointer-events:none;filter:grayscale(.4);}
.card-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.c-icon{width:34px;height:34px;background:var(--light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}

/* CALLOUT */
.callout{border-radius:8px;padding:13px 16px;font-size:.88rem;line-height:1.6;}
.ci{background:var(--light);border-left:4px solid var(--teal);color:var(--slate);}
.cw{background:#FFF8E1;border-left:4px solid var(--gold);color:#7A5C00;}
.co{background:#D4EDDA;border-left:4px solid var(--ok);color:#145224;}
.cn{background:var(--navy);border-left:4px solid var(--teal);color:var(--white);}
.ce{background:#F8D7DA;border-left:4px solid var(--err);color:#7a1020;}

/* TESTO */
.tp{font-size:.93rem;line-height:1.78;color:#333;margin-bottom:12px;}
.tp:last-child{margin-bottom:0;}
.th{font-size:.97rem;font-weight:700;color:var(--navy);margin:18px 0 6px;}
.ev{background:var(--light);border-radius:5px;padding:2px 7px;color:var(--navy);font-weight:600;}
.qt{border-left:3px solid var(--gold);padding:10px 16px;margin:12px 0;font-style:italic;color:var(--slate);font-size:.9rem;}

/* BOTTONI */
.btn{padding:9px 22px;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.bp{background:var(--teal);color:var(--white);}
.bp:hover{background:#25a88a;}
.bn{background:var(--navy);color:var(--white);}
.bn:hover{background:#131a30;}
.bo{background:transparent;border:2px solid var(--teal);color:var(--teal);}
.bo:hover{background:var(--light);}
.bg{background:var(--gold);color:var(--navy);font-weight:800;}
.btn:disabled{opacity:.38;cursor:not-allowed;}

/* BRAINSTORMING */
.bs-row{display:flex;gap:8px;margin-bottom:8px;}
.bs-row input{flex:1;padding:9px 13px;border:2px solid #DDE1E7;border-radius:8px;font-size:.95rem;font-family:inherit;transition:border-color .2s;}
.bs-row input:focus{outline:none;border-color:var(--teal);}
#bs-fb{font-size:.83rem;min-height:18px;margin-bottom:8px;font-weight:600;}
.sog-wrap{height:5px;background:#E0E4EA;border-radius:3px;overflow:hidden;margin-bottom:5px;}
.sog-bar{height:100%;background:var(--teal);border-radius:3px;transition:width .4s;}
#bs-cnt{font-size:.78rem;color:var(--gray);margin-bottom:10px;}
#nuvola{min-height:60px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:12px;background:var(--bg);border-radius:9px;border:1px dashed #CDD1D9;margin-bottom:10px;}
.tag{padding:5px 12px;border-radius:18px;font-weight:700;font-size:.85rem;}
.ts{background:var(--teal);color:var(--white);}
.td{background:var(--navy);color:var(--white);border:2px solid var(--gold);}
.told{background:#D0EDE6;color:var(--slate);}

/* MAPPA VISIVA */
.mappa-vis{display:flex;flex-direction:column;align-items:center;gap:2px;margin:10px 0;}
.mv-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.mv-nodo{padding:9px 18px;border-radius:8px;font-weight:700;font-size:.87rem;text-align:center;border:2px solid var(--navy);background:var(--white);color:var(--navy);}
.mv-c{background:var(--navy);color:var(--white);border-color:var(--navy);font-size:.97rem;padding:11px 22px;}
.mv-s{background:var(--light);border-color:var(--teal);color:var(--slate);}
.mv-g{background:#FFF8E1;border-color:var(--gold);color:#7A5C00;}
.mv-lv{width:2px;height:16px;background:#CDD1D9;margin:0 auto;}
.mv-lh{height:2px;width:32px;background:#CDD1D9;}

/* MAPPA LACUNOSA */
.nl{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;border:2px solid #E0E4EA;transition:border-color .2s;}
.nl.nok{border-color:var(--ok);background:#D4EDDA14;}
.nl.nko{border-color:var(--err);background:#F8D7DA14;}
.fl{font-size:.95rem;line-height:1.8;color:var(--navy);font-weight:500;margin-bottom:10px;}
.bw{color:var(--teal);font-weight:700;border-bottom:2px solid var(--teal);padding:0 3px;}
.opz{display:flex;flex-wrap:wrap;gap:7px;}
.ob{padding:6px 14px;border:2px solid #DDE1E7;border-radius:18px;background:var(--white);font-size:.87rem;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--text);}
.ob:hover{border-color:var(--teal);color:var(--teal);}
.ob.sel{border-color:var(--navy);background:var(--navy);color:var(--white);}
.ob.corr{border-color:var(--ok);background:var(--ok);color:var(--white);}
.ob.sba{border-color:var(--err);background:var(--err);color:var(--white);}
.nfb{margin-top:7px;font-size:.82rem;font-weight:600;min-height:14px;}

/* CLOZE */
.cloze-q{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;border:2px solid #E0E4EA;}
.cloze-q.nok{border-color:var(--ok);}
.cloze-q.nko{border-color:var(--err);}
.cloze-testo{font-size:.93rem;line-height:1.7;margin-bottom:10px;color:var(--navy);}
.cloze-scelte{display:flex;flex-wrap:wrap;gap:7px;}

/* FLASHCARD */
.fc-wrap{perspective:1000px;margin-bottom:12px;}
.fc{position:relative;width:100%;min-height:140px;cursor:pointer;transform-style:preserve-3d;transition:transform .4s;}
.fc.flip{transform:rotateY(180deg);}
.fcf,.fcb{
  position:absolute;width:100%;min-height:140px;border-radius:10px;padding:20px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;text-align:center;
}
.fcf{background:var(--navy);color:var(--white);font-size:.98rem;font-weight:600;border:3px solid var(--teal);}
.fcb{
  background:var(--light);color:var(--navy);font-size:.9rem;line-height:1.6;
  border:3px solid var(--teal);
  transform:rotateY(180deg);
  /* testo NON specchiato: il parent ruota, il figlio è già pre-ruotato di 180° */
}
.fcb .fcb-inner{transform:none;width:100%;}
.fc-hint{position:absolute;bottom:7px;right:11px;font-size:.68rem;opacity:.45;}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.fc-stato{display:flex;gap:8px;margin-top:10px;}
.fc-stato button{flex:1;padding:8px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;}
.fsok{background:var(--ok);color:var(--white);}
.fsrip{background:#E0E4EA;color:var(--slate);}

/* QUADERNO GUIDA */
.quad-step{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;border:2px solid #E0E4EA;transition:all .25s;}
.quad-step.done{border-color:var(--ok);background:#D4EDDA14;}
.quad-step-header{display:flex;align-items:flex-start;gap:12px;}
.quad-chk{width:24px;height:24px;border-radius:6px;border:2px solid #CDD1D9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:1px;transition:all .2s;}
.quad-chk.on{background:var(--ok);border-color:var(--ok);color:var(--white);}
.quad-step-body{flex:1;}
.quad-step-title{font-weight:700;font-size:.9rem;color:var(--navy);margin-bottom:4px;}
.quad-step-desc{font-size:.85rem;color:var(--slate);line-height:1.55;}
.quad-step-desc strong{color:var(--navy);}
.quad-schema{background:var(--navy);border-radius:8px;padding:14px;margin-top:10px;font-family:'Courier New',monospace;font-size:.78rem;color:var(--teal);line-height:1.7;white-space:pre;}
.quad-unlock{margin-top:16px;padding:14px;background:var(--light);border-radius:8px;border:2px dashed var(--teal);text-align:center;}
.quad-mancano{font-size:.82rem;color:var(--err);font-weight:700;margin-top:4px;}

/* CASO */
.caso-header{background:linear-gradient(135deg,var(--navy),var(--slate));border-radius:10px;padding:20px;color:var(--white);margin-bottom:14px;}
.caso-tabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.ctb{padding:7px 14px;border-radius:18px;border:2px solid #DDE1E7;background:var(--white);font-size:.83rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--slate);}
.ctb.on{background:var(--navy);color:var(--white);border-color:var(--navy);}
.caso-sez{display:none;}
.caso-sez.vis{display:block;}

/* TABELLE CONFRONTO */
.tab-cf{width:100%;border-collapse:collapse;font-size:.85rem;margin:10px 0;}
.tab-cf th{background:var(--navy);color:var(--white);padding:9px 12px;text-align:left;}
.tab-cf td{padding:8px 12px;border-bottom:1px solid #EEE;vertical-align:top;}
.tab-cf tr:nth-child(even) td{background:var(--bg);}

/* MOTIVAZIONALE */
.motiv{text-align:center;padding:18px 12px;}
.motiv .em{font-size:2.3rem;margin-bottom:9px;}
.motiv p{font-size:1rem;color:var(--navy);font-weight:500;line-height:1.6;max-width:500px;margin:0 auto;}
.perc{display:inline-block;background:var(--navy);color:var(--teal);font-size:1.9rem;font-weight:900;padding:10px 26px;border-radius:10px;margin-bottom:14px;letter-spacing:.04em;}

/* RIPASSO */
.rip-q{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;border:2px solid #E0E4EA;}
.rip-q.nok{border-color:var(--ok);}
.rip-q.nko{border-color:var(--err);}

/* LOGIN */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px;}
.lb{background:var(--white);border-radius:16px;padding:38px 34px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.l-sig{font-size:2.1rem;font-weight:900;color:var(--navy);text-align:center;}
.l-sub{font-size:.8rem;color:var(--gray);text-align:center;margin-top:3px;margin-bottom:26px;}
.l-av{background:var(--light);border-left:4px solid var(--teal);padding:10px 13px;border-radius:0 8px 8px 0;font-size:.79rem;color:var(--slate);line-height:1.5;margin-bottom:20px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-weight:600;font-size:.8rem;color:var(--slate);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select{width:100%;padding:9px 13px;border:2px solid #DDE1E7;border-radius:8px;font-size:.97rem;font-family:inherit;transition:border-color .2s;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--teal);}
.ferr{color:var(--err);font-size:.8rem;margin-top:4px;min-height:14px;}

/* UTILITY */
.hidden{display:none!important;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}.mt20{margin-top:20px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}
.tr{text-align:right;}.tc{text-align:center;}
.sep{height:1px;background:#EAEAEA;margin:18px 0;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:700;}
.bdg-new{background:var(--teal);color:var(--white);}
.bdg-rip{background:#FFF8E1;color:var(--gold);border:1px solid var(--gold);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="lb">
    <div class="l-sig">DEP</div>
    <div class="l-sub">Diritto e Economia Politica — ITE Tambosi</div>
    <div class="l-av">⚠ I progressi vengono salvati <strong>su questo dispositivo e questo browser</strong>. Usa sempre lo stesso browser per continuare il percorso.</div>
    <div class="fg">
      <label for="inp-nome">Il tuo nome</label>
      <input type="text" id="inp-nome" placeholder="Nome e Cognome" maxlength="40" autocomplete="off">
      <div class="ferr" id="ferr-nome"></div>
    </div>
    <div class="fg">
      <label for="inp-classe">La tua classe</label>
      <select id="inp-classe">
        <option value="">— Seleziona —</option>
        <optgroup label="Classi Prime">
          <option value="1AE">1AE</option><option value="1AC">1AC</option>
          <option value="1AD">1AD</option><option value="1AH">1AH</option><option value="1AA">1AA</option>
        </optgroup>
        <optgroup label="Classi Seconde">
          <option value="2AC">2AC</option><option value="2AD">2AD</option>
          <option value="2AF">2AF</option><option value="2AH">2AH</option>
        </optgroup>
      </select>
      <div class="ferr" id="ferr-classe"></div>
    </div>
    <button class="btn bp" style="width:100%;margin-top:8px;" onclick="doLogin()">Inizia il percorso →</button>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="hidden">
  <div id="header">
    <h1>📘 Diritto e Economia Politica</h1>
    <span id="header-info"></span>
  </div>
  <div id="stepper"></div>
  <div id="pbar-wrap"><div id="pbar" style="width:0%"></div></div>
  <div id="main"><div id="contenuto"></div></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURAZIONE
// ═══════════════════════════════════════════
const CFG = { gasUrl:'' };
const BS_MIN = 3;

const G = {
  nome:'', classe:'', mod:'mod1', fase:0,
  stati:[], errori:[],
};

const FASI = ['G1','G2','G3','G4','G5','G6','G7'];
const FASI_LABEL = [
  'Lo Stato','Forme di Stato','Gov. Parlamentare',
  'Gov. Presidenziale','Caso Francia','Italia vs Francia','Ripasso'
];

// ═══════════════════════════════════════════
// DIZIONARIO BRAINSTORMING
// ═══════════════════════════════════════════
const BSD = [
  {c:'stato',v:['stato','statale','stati']},
  {c:'democrazia',v:['democrazia','democratico','democratica','demo']},
  {c:'territorio',v:['territorio','territoriale','territori','terra']},
  {c:'sovranità',v:['sovranità','sovranita','sovrano','sovrana']},
  {c:'popolo',v:['popolo','popolazione','popoli','cittadini','gente']},
  {c:'governo',v:['governo','governativo','governare','governi']},
  {c:'parlamento',v:['parlamento','parlamentare','parlamentari']},
  {c:'costituzione',v:['costituzione','costituzionale','carta','costituzioni']},
  {c:'repubblica',v:['repubblica','repubblicano','repubblicana']},
  {c:'legge',v:['legge','leggi','normativa','norma','diritto']},
  {c:'presidente',v:['presidente','presidenziale','presidenzialismo']},
  {c:'potere',v:['potere','poteri','autorità']},
  {c:'nazione',v:['nazione','nazionale','nazionali']},
  {c:'elezione',v:['elezione','elezioni','voto','votare','suffragio']},
  {c:'monarchia',v:['monarchia','monarchico','re','regina','monarca']},
  {c:'degaulle',v:['de gaulle','degaulle','gaulle','charles']},
  {c:'francia',v:['francia','francese','francesi']},
  {c:'separazione',v:['separazione','divisione','bilanciamento']},
  {c:'cittadinanza',v:['cittadinanza','cittadino']},
  {c:'libertà',v:['libertà','liberta','libero','liberi']},
];

// ═══════════════════════════════════════════
// DATI GIORNO PER GIORNO
// ═══════════════════════════════════════════

// ── FLASHCARD cumulative ──
const FC = [
  // G1
  {id:'f1',g:1,d:'Quali sono i tre elementi costitutivi dello Stato?',r:'Popolo, territorio e sovranità. Tutti e tre devono essere presenti contemporaneamente.'},
  {id:'f2',g:1,d:'Differenza tra forma di Stato e forma di governo?',r:'Forma di Stato = chi detiene il potere (rapporto Stato-cittadini). Forma di governo = come è organizzato il potere tra gli organi.'},
  // G2
  {id:'f3',g:2,d:'Cosa caratterizza uno Stato democratico?',r:'Riconosce i diritti fondamentali dei cittadini, divide i poteri tra più organi, prevede elezioni libere e periodiche.'},
  {id:'f4',g:2,d:'Cos\'è uno Stato totalitario? Fai un esempio storico.',r:'Uno Stato che concentra tutto il potere in un solo soggetto o partito, sopprimendo ogni opposizione. Es: fascismo italiano, nazismo tedesco.'},
  {id:'f5',g:2,d:'Differenza tra monarchia assoluta e monarchia costituzionale?',r:'Nella monarchia assoluta il re ha potere illimitato. In quella costituzionale il potere del re è limitato dalla Costituzione e da un parlamento.'},
  // G3
  {id:'f6',g:3,d:'Cos\'è il governo parlamentare? Chi ha più potere?',r:'Il parlamento è il centro del potere: nomina e può sfiduciare il governo. Il presidente della repubblica ha ruolo principalmente cerimoniale.'},
  {id:'f7',g:3,d:'Cosa succede quando il parlamento vota la sfiducia al governo?',r:'Il governo deve dimettersi. Si forma un nuovo governo (con lo stesso o un diverso Primo Ministro) oppure si va a nuove elezioni.'},
  // G4
  {id:'f8',g:4,d:'Come funziona il governo presidenziale? (modello USA)',r:'Il presidente è eletto direttamente dai cittadini, è capo dello Stato E del governo, non può essere sfiduciato dal parlamento. Separazione netta dei poteri.'},
  {id:'f9',g:4,d:'Cos\'è il governo semipresidenziale? Esempio.',r:'Combina elementi del sistema parlamentare e presidenziale. Il presidente ha poteri reali MA esiste anche un Primo Ministro responsabile davanti al parlamento. Esempio: Francia.'},
  // G5
  {id:'f10',g:5,d:'Perché la Quarta Repubblica francese era instabile?',r:'Il parlamento aveva tutto il potere ma nessuna maggioranza stabile. In 12 anni ci furono 25 governi, con una durata media inferiore a 6 mesi.'},
  {id:'f11',g:5,d:'Quale fu il ruolo di De Gaulle nella nascita della Quinta Repubblica?',r:'Chiamato al potere nel 1958 durante la crisi algerina, scrisse una nuova Costituzione che rafforzava il presidente. Fu il primo presidente della Quinta Repubblica.'},
  // G6
  {id:'f12',g:6,d:'Perché l\'Italia del 1948 scelse il parlamentarismo e non il presidenzialismo?',r:'Per evitare il ritorno di un esecutivo forte dopo il fascismo. I costituenti temevano che un presidente con troppo potere potesse diventare un nuovo dittatore.'},
  {id:'f13',g:6,d:'Qual è la principale differenza tra il sistema italiano e quello francese oggi?',r:'In Italia il presidente ha poteri limitati e il parlamento è centrale. In Francia il presidente è eletto direttamente e ha poteri esecutivi reali (semipresidenzialismo).'},
];

// ── NODI MAPPA LACUNOSA ──
const NODI = {
  g1:[
    {id:'g1n1',pre:'Lo Stato è composto da: popolo, ',post:' e sovranità.',opz:['territorio','governo','parlamento','religione'],ok:'territorio'},
    {id:'g1n2',pre:'Il potere supremo dello Stato si chiama ',post:'.',opz:['sovranità','democrazia','costituzione','autonomia'],ok:'sovranità'},

// ═══════════════════════════════════════════
const ipl = t => t.replace(/\{nome\}/g, G.nome);
const norm = s => s.toLowerCase()
  .replace(/[àáâã]/g,'a').replace(/[èéêë]/g,'e')
  .replace(/[ìíî]/g,'i').replace(/[òóô]/g,'o')
  .replace(/[ùúû]/g,'u').trim();

function nomeOk(n){
  const s=n.trim();
  if(s.length<2) return 'Il nome è troppo corto.';
  if(/^(.)\1+$/.test(s)) return 'Sembra una sequenza ripetuta. Scrivi il tuo vero nome.';
  if(!/[aeiouàèéìòù]/i.test(s)) return 'Il nome non contiene vocali.';
  if(/^\d+$/.test(s)) return 'Scrivi il tuo nome, non un numero.';
  return '';
}

function errKey(){ return `${norm(G.nome)}_${G.classe}_${G.mod}_errori`; }
function loadErr(){ try{G.errori=JSON.parse(localStorage.getItem(errKey())||'[]');}catch(e){G.errori=[];} }
function regErr(faseId,domId){
  loadErr();
  const i=G.errori.findIndex(e=>e.faseId===faseId&&e.domandaId===domId);
  if(i>=0)G.errori[i].tentativiErrati++;
  else G.errori.push({faseId,domandaId:domId,tentativiErrati:1});
  try{localStorage.setItem(errKey(),JSON.stringify(G.errori));}catch(e){}
}
function send(p){
  if(!CFG.gasUrl)return;
  // GAS non supporta CORS con fetch+JSON direttamente.
  // Soluzione: form POST in iframe nascosto — funziona senza preflight CORS.
  try{
    let iframe=document.getElementById('_gas_ifr');
    if(!iframe){
      iframe=document.createElement('iframe');
      iframe.name='_gas_ifr';iframe.id='_gas_ifr';iframe.style.display='none';
      document.body.appendChild(iframe);
    }
    const form=document.createElement('form');
    form.method='POST';form.action=CFG.gasUrl;form.target='_gas_ifr';form.style.display='none';
    const inp=document.createElement('input');
    inp.type='hidden';inp.name='payload';inp.value=JSON.stringify(p);
    form.appendChild(inp);
    document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{try{document.body.removeChild(form);}catch(e){}},4000);
  }catch(e){}
}

function doLogin(){
  const ne=document.getElementById('inp-nome');
  const ce=document.getElementById('inp-classe');
  const en=document.getElementById('ferr-nome');
  const ec=document.getElementById('ferr-classe');
  en.textContent='';ec.textContent='';
  const err=nomeOk(ne.value);
  if(err){en.textContent=err;ne.focus();return;}
  if(!ce.value){ec.textContent='Seleziona la tua classe.';ce.focus();return;}
  G.nome=ne.value.trim();G.classe=ce.value;
  loadErr();
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');
  document.getElementById('header-info').textContent=G.nome+' · '+G.classe;
  renderStepper();
  goFase(0);
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('inp-nome').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

// STEPPER
// ═══════════════════════════════════════════
function renderStepper(){
  const el=document.getElementById('stepper');el.innerHTML='';
  FASI.forEach((f,i)=>{
    const s=G.stati[i];
    const done=s&&s.completata;
    const curr=i===G.fase;
    const lock=i>G.fase;
    const wrap=document.createElement('div');wrap.className='step-item';
    const btn=document.createElement('button');
    btn.className='step-btn'+(done?' ok':'')+(curr?' curr':'');
    btn.disabled=lock;
    btn.innerHTML=`<div class="step-circle">${done?'✓':(i+1)}</div><div class="step-label">${FASI_LABEL[i]}</div>`;
    if(!lock&&!curr)btn.onclick=()=>goFase(i);
    wrap.appendChild(btn);
    if(i<FASI.length-1){
      const c=document.createElement('div');c.className='step-conn'+(done?' done':'');
      wrap.appendChild(c);
    }
    el.appendChild(wrap);
  });
}

// NAVIGAZIONE FASE
// ═══════════════════════════════════════════
function goFase(i){
  G.fase=i;initSnap(i);
  document.getElementById('pbar').style.width=((i+1)/7*100)+'%';
  renderStepper();
  const el=document.getElementById('contenuto');el.innerHTML='';
  const builders=[renderG1,renderG2,renderG3,renderG4,renderG5,renderG6,renderG7];
  builders[i](el);
  window.scrollTo({top:0,behavior:'smooth'});
}

    <div class="sog-wrap"><div class="sog-bar" id="sog-bar" style="width:0%"></div></div>
    <div id="bs-cnt">0 / ${BS_MIN} parole minime</div>
    <div id="nuvola"></div>
    <div id="bs-btn-wrap" class="tc mt12 hidden">
      <button class="btn bg" onclick="bsShowDoc()">✓ Ho inserito le mie parole — vai avanti →</button>
    </div>
    <div id="bs-skip-wrap" class="tc mt8 hidden">
      <button class="btn bo" style="font-size:.8rem;padding:6px 14px;" onclick="bsShowDoc()">
        Non trovo altre parole — vai avanti lo stesso →
      </button>
    </div>`;
  setTimeout(()=>{
    const inp=document.getElementById('bs-inp');
    if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')bsAdd();});
    renderNuvola(s);
  },0);
  return c;
}

function renderNuvola(s){
  const el=document.getElementById('nuvola');if(!el)return;
  if(!s.bs.parole.length&&!s.bs.docShown){
    el.innerHTML='<span style="color:var(--gray);font-size:.83rem;font-style:italic;">Le tue parole appariranno qui.</span>';
  } else {
    const ts=s.bs.parole.map(p=>`<span class="tag ts">${p}</span>`).join('');
    const td=s.bs.docShown?BSD.slice(0,4).map(e=>`<span class="tag td" title="${e.c}">📌 ${e.c}</span>`).join(''):'';
    el.innerHTML=ts+td;
    if(s.bs.docShown){
      const h=document.createElement('div');
      h.style='font-size:.73rem;color:var(--gray);margin-top:7px;width:100%;';
      h.textContent='📌 Parole con bordo oro = parole chiave del docente';
      el.appendChild(h);
    }
  }
  const perc=Math.min(100,Math.round(s.bs.parole.length/BS_MIN*100));
  const bar=document.getElementById('sog-bar');if(bar)bar.style.width=perc+'%';
  const cnt=document.getElementById('bs-cnt');if(cnt)cnt.textContent=s.bs.parole.length+' / '+BS_MIN+' parole minime';
  const bw=document.getElementById('bs-btn-wrap');
  if(bw){if(s.bs.parole.length>=BS_MIN&&!s.bs.docShown)bw.classList.remove('hidden');else bw.classList.add('hidden');}
}

function bsAdd(){
  const inp=document.getElementById('bs-inp');
  const fb=document.getElementById('bs-fb');
  if(!inp||!fb)return;
  const raw=inp.value.trim();if(!raw)return;
  const s=sn(G.fase);

  // Filtro volgarità
  if(contieneVolg(raw)){
    fb.style.color='var(--err)';
    fb.textContent='⚠ Questa parola non è adatta. Il quaderno di Diritto è uno spazio di studio serio — usa un termine diverso.';
    inp.value='';inp.focus();return;
  }

  const n=norm(raw);
  const entry=BSD.find(e=>e.v.some(v=>norm(v)===n));

  if(!entry){
    if(!s.bs._tentFalliti)s.bs._tentFalliti=0;
    s.bs._tentFalliti++;
    fb.style.color='var(--err)';
    fb.textContent='❌ "'+raw+'" non è pertinente al tema Stato. Prova con un\'altra parola (es. governo, popolo, legge...).';
    inp.value='';inp.focus();
    // Dopo 3 tentativi falliti mostra pulsante per andare avanti
    if(s.bs._tentFalliti>=3){
      const sw=document.getElementById('bs-skip-wrap');
      if(sw)sw.classList.remove('hidden');
    }
    return;
  }

  if(s.bs.concetti.includes(entry.c)){
    if(!s.bs._tentDupl)s.bs._tentDupl=0;
    s.bs._tentDupl++;
    fb.style.color='var(--gold)';
    fb.textContent='⚠ Questo concetto è già nella nuvola. Prova con una parola diversa, o vai avanti se non ne trovi altre.';
    inp.value='';inp.focus();
    if(s.bs._tentDupl>=2){
      const sw=document.getElementById('bs-skip-wrap');
      if(sw)sw.classList.remove('hidden');
    }
    return;
  }

  s.bs.concetti.push(entry.c);s.bs.parole.push(raw);
  s.bs._tentFalliti=0;s.bs._tentDupl=0;
  fb.style.color='var(--ok)';fb.textContent='✓ "'+raw+'" aggiunta!';
  inp.value='';inp.focus();
  renderNuvola(s);sv('bs',s.bs);
}

function bsShowDoc(){
  const s=sn(G.fase);s.bs.docShown=true;sv('bs',s.bs);

    </div>
    <div id="fc-prog" style="margin-top:9px;font-size:.8rem;color:var(--gray);text-align:right;"></div>`;
  setTimeout(()=>renderFc(s,gi),0);

function fcDel(gi){return FC.filter(f=>f.g<=gi+1);}

function renderFc(s,gi){
  const cards=fcDel(gi);
  const idx=s.fc.idx||0;const fc=cards[idx];if(!fc)return;
  const nuova=fc.g===gi+1;
  const fEl=document.getElementById('fc-f');
  const bEl=document.getElementById('fc-b');
  const card=document.getElementById('fc-card');
  if(fEl){
    fEl.style.borderColor=nuova?'var(--gold)':'var(--teal)';
    fEl.innerHTML=`<div>${fc.d}<div class="fc-hint">clicca per girare</div></div>`;
  }
  if(bEl){
    bEl.style.borderColor=nuova?'var(--gold)':'var(--teal)';
    // Usa div interno per evitare testo specchiato dopo rotazione CSS
    bEl.innerHTML=`<div class="fcb-inner">${fc.r}</div>`;
  }
  if(card)card.classList.remove('flip');
  const st=document.getElementById('fc-stato');if(st)st.classList.add('hidden');
  const cnt=document.getElementById('fc-cnt');if(cnt)cnt.textContent=(idx+1)+' / '+cards.length;
  const prev=document.getElementById('fc-prev');if(prev)prev.disabled=idx===0;
  const next=document.getElementById('fc-next');if(next)next.disabled=idx===cards.length-1;
  const prog=document.getElementById('fc-prog');
  if(prog)prog.textContent=Object.keys(s.fc.stati).length+' su '+cards.length+' valutate';
}

function fcFlip(){
  const card=document.getElementById('fc-card');if(!card)return;
  card.classList.toggle('flip');
  const st=document.getElementById('fc-stato');
  if(card.classList.contains('flip')&&st)st.classList.remove('hidden');
}

function fcVal(esito){
  const s=sn(G.fase);const gi=G.fase;
  const cards=fcDel(gi);const idx=s.fc.idx||0;const fc=cards[idx];if(!fc)return;
  s.fc.stati[fc.id]=esito;
  if(esito==='rip')regErr('g'+(gi+1)+'_fc',fc.id);
  sv('fc',s.fc);
  if(idx<cards.length-1){s.fc.idx=idx+1;renderFc(s,gi);}
  else{
    const st=document.getElementById('fc-stato');if(st)st.classList.add('hidden');
    const prog=document.getElementById('fc-prog');
    if(prog)prog.innerHTML='<span style="color:var(--ok);font-weight:700;">✓ Tutte le flashcard completate! Ottimo.</span>';
  }
}

function fcNav(d){
  const s=sn(G.fase);const gi=G.fase;
  const cards=fcDel(gi);
  const i=(s.fc.idx||0)+d;
  if(i<0||i>=cards.length)return;
  s.fc.idx=i;renderFc(s,gi);
}

function togQuad(stepId){
  const s=sn(G.fase);

  if(qs){if(s.quad[stepId])qs.classList.add('done');else qs.classList.remove('done');}

  aggiornaQuadUnlock(s,data);

function aggiornaQuadUnlock(s,data){
  const tutte=data.steps.every(st=>s.quad&&s.quad[st.id]);

  const mancano=data.steps.filter(st=>!(s.quad&&s.quad[st.id])).length;

    <div class="th">Qual è il sistema migliore?</div>
    <p class="tp">Non esiste un sistema perfetto. Il presidenzialismo garantisce stabilità ma concentra il potere. Il parlamentarismo garantisce controllo ma può produrre instabilità. Il semipresidenzialismo cerca un equilibrio, ma richiede che il Presidente usi il potere con responsabilità.</p>
    <div class="callout ci">Domani — Giorno 7 — fai il ripasso finale. Rivedrai tutti i concetti su cui hai fatto più errori.</div>`;

  el.appendChild(mkApertura(5));
  el.appendChild(mkBs(s,5));
  el.appendChild(mkBsDoc(s));
  el.appendChild(mkSpieg(s,spiegHtml,'card-spieg'));
  el.appendChild(mkMappa(s,'g6'));
  el.appendChild(mkFlashcard(s,5));
  el.appendChild(mkCaso(s));
  el.appendChild(mkQuaderno(s,5));
  el.appendChild(mkChiusura(5));
  setTimeout(()=>{aggiornaSezioni(s);renderNodi(s,NODI.g6);renderFc(s,5);},0);
}

// ═══════════════════════════════════════════
// GIORNO 7 — Ripasso adattivo
// ═══════════════════════════════════════════
function renderG7(el){
  const s=sn(6);
  el.appendChild(mkApertura(6));
  el.appendChild(mkBs(s,6));
  el.appendChild(mkBsDoc(s));
  el.appendChild(mkRipasso(s));
  el.appendChild(mkAutoval(s));
  el.appendChild(mkFlashcard(s,6));
  el.appendChild(mkQuaderno(s,6));
  el.appendChild(mkChiusura(6));
  setTimeout(()=>{aggiornaSezioni(s);renderFc(s,6);},0);
}

function mkRipasso(s){
  const c=mk('card hidden');c.id='card-ripasso';
  loadErr();
  const errori=G.errori.sort((a,b)=>b.tentativiErrati-a.tentativiErrati);

  if(!errori.length){
    c.innerHTML=`<div class="card-title"><div class="c-icon">🔁</div>Ripasso adattivo</div>
      <div class="callout co">🎉 Nessun errore nei giorni precedenti! Hai risposto correttamente a tutto. Rivedi le flashcard in ordine inverso come sfida aggiuntiva.</div>`;
    return c;
  }

  // Raccoglie le domande degli errori da tutti i nodi e cloze
  const tutte=[...Object.values(NODI).flat(),...Object.values(CLOZE).flat()];
  const daRipassare=errori.slice(0,6).map(e=>{
    const n=tutte.find(q=>q.id===e.domandaId);
    return n?{...n,errori:e.tentativiErrati}:null;
  }).filter(Boolean);

  c.innerHTML=`<div class="card-title"><div class="c-icon">🔁</div>Ripasso adattivo — le tue domande difficili</div>
    <p class="tp mb12">Queste sono le domande su cui hai sbagliato di più. Riprova — questa volta sai già la risposta corretta.</p>
    <div id="rip-lista"></div>
    <div class="tr mt12"><button class="btn bo" onclick="verificaRipasso()">Verifica ripasso →</button></div>
    <div id="rip-fb" class="mt8"></div>`;

  setTimeout(()=>{
    const el=document.getElementById('rip-lista');if(!el)return;
    daRipassare.forEach((q,i)=>{
      const opz=q.opz||q.scelte;if(!opz)return;
      const div=mk('rip-q');div.id='rq-'+i;
      const r=s.mappa['rip_'+i]||null;
      div.innerHTML=`<div class="fl mb8"><strong>${q.pre||q.testo}</strong>${q.post||''}</div>
        <div class="opz">${opz.map(o=>`<button class="ob${r===o?' sel':''}" onclick="selRip(${i},'${o.replace(/'/g,"\\'")}','${(q.ok).replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}</div>
        <div class="nfb" id="rfb-${i}"></div>`;
      el.appendChild(div);
    });
    // salva riferimento per verifica
    window._ripassoDomande=daRipassare;
  },0);
  return c;
}

function selRip(i,op,ok,btn){
  const s=sn(G.fase);if(!s.mappa)s.mappa={};
  s.mappa['rip_'+i]=op;sv('mappa',s.mappa);
  const rq=document.getElementById('rq-'+i);
  if(rq)rq.querySelectorAll('.ob').forEach(b=>b.className='ob'+(b.textContent===op?' sel':''));
}

function verificaRipasso(){
  const domande=window._ripassoDomande||[];
  const s=sn(G.fase);let ok=0;
  const fb=document.getElementById('rip-fb');
  domande.forEach((q,i)=>{
    const r=s.mappa&&s.mappa['rip_'+i];
    const rq=document.getElementById('rq-'+i);
    const rf=document.getElementById('rfb-'+i);
    if(!r){if(rq)rq.className='rip-q nko';if(rf){rf.style.color='var(--err)';rf.textContent='⚠ Scegli una risposta.';}return;}
    const corr=r===q.ok;
    if(rq)rq.className='rip-q '+(corr?'nok':'nko');
    if(rq)rq.querySelectorAll('.ob').forEach(b=>{
      if(b.textContent===q.ok)b.className='ob corr';
      else if(b.textContent===r&&!corr)b.className='ob sba';
    });
    if(rf){rf.style.color=corr?'var(--ok)':'var(--err)';rf.textContent=corr?'✓ Corretto!':'✗ Risposta: "'+q.ok+'".';}
    if(corr)ok++;
  });
  if(fb)fb.innerHTML=ok===domande.length
    ?'<div class="callout co">✓ Ripasso completato alla perfezione! Sei pronto per la verifica.</div>'
    :ok>=domande.length/2
      ?'<div class="callout cw">'+ok+' su '+domande.length+'. Quasi! Rileggi la spiegazione dei punti sbagliati.</div>'
      :'<div class="callout ce">'+ok+' su '+domande.length+'. Rivedi la spiegazione e riprova.</div>';
}

function mkAutoval(s){
  const c=mk('card hidden');c.id='card-autoval';
  const domande=[
    {id:'av1',testo:'Quanto ti senti sicuro sui tre elementi dello Stato?'},
    {id:'av2',testo:'Quanto ti senti sicuro sulla differenza tra forma di Stato e forma di governo?'},
    {id:'av3',testo:'Quanto ti senti sicuro sui tre sistemi di governo (parlamentare, presidenziale, semipresidenziale)?'},
    {id:'av4',testo:'Quanto ti senti sicuro sul caso Francia / De Gaulle?'},
  ];
  c.innerHTML=`<div class="card-title"><div class="c-icon">📊</div>Autovalutazione — quanto mi sento sicuro?</div>
    <p class="tp mb12">Valuta onestamente il tuo livello di sicurezza su ogni argomento. Nessuno vede queste risposte — sii onesto con te stesso.</p>
    ${domande.map(d=>`
      <div style="margin-bottom:16px;">
        <div style="font-size:.9rem;font-weight:600;color:var(--navy);margin-bottom:8px;">${d.testo}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${['😕 Per niente','😐 Poco','🙂 Abbastanza','😊 Molto','🤩 Sicurissimo'].map((l,i)=>
            `<button class="ob" id="av-${d.id}-${i}" onclick="selAv('${d.id}',${i})">${l}</button>`
          ).join('')}
        </div>
      </div>`).join('')}
    <div id="av-fb"></div>`;
  return c;
}

function selAv(did,i){
  document.querySelectorAll(`[id^="av-${did}-"]`).forEach((b,j)=>b.className='ob'+(j===i?' sel':''));
  const s=sn(G.fase);if(!s.autoval)s.autoval={};
  s.autoval[did]=i;sv('autoval',s.autoval);
  // Controlla se tutte compilate
  const tutte=document.querySelectorAll('[id^="av-"]');
  const sels=document.querySelectorAll('[id^="av-"].sel');
  const fb=document.getElementById('av-fb');
  if(fb&&sels.length>=4){
    fb.innerHTML='<div class="callout co mt8">✓ Autovalutazione completata. Questi dati ti aiuteranno a capire su cosa concentrarti nel prossimo modulo.</div>';
  }
}
</script>
